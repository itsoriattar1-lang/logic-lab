<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision AI | Knowledge Probe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .study-card { border-radius: 24px; border: 1px solid #e2e8f0; background: white; transition: all 0.3s ease; }
        .quiz-option { border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s; border-radius: 12px; padding: 1rem; font-size: 0.85rem; font-weight: 500; }
        .quiz-option:hover:not(.locked) { border-color: #3b82f6; background: #f0f9ff; }
        .quiz-option.selected-wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        .quiz-option.show-correct { border-color: #10b981; background: #f0fdf4; color: #166534; font-weight: 700; }
        .explanation-box { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen text-slate-900 font-sans pb-24">
    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10 border-b pb-8">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black italic shadow-lg">DV</div>
                <h1 class="text-lg font-black tracking-tighter uppercase">DocuVision <span class="text-blue-600">Pro</span></h1>
            </div>
            <div id="masteryContainer" class="hidden flex items-center gap-4">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Mastery</p>
                <div class="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="masteryBar" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="masteryPercent" class="text-xs font-black text-slate-900">0%</p>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <div id="dropZone" class="rounded-2xl p-6 text-center bg-white border-2 border-dashed border-slate-200 cursor-pointer hover:border-blue-500 transition-all">
                    <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-tight">Upload PDF</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <h3 class="text-[9px] font-black text-slate-400 mb-4 uppercase tracking-widest">Analysis Depth</h3>
                    <div class="space-y-2">
                        <button data-level="1" class="level-btn active w-full text-left px-4 py-2.5 rounded-xl border text-[11px] font-bold">L1: SUMMARY</button>
                        <button data-level="3" class="level-btn w-full text-left px-4 py-2.5 rounded-xl border text-[11px] font-bold border-blue-100 text-blue-600">L3: CONTENT QUIZ</button>
                    </div>
                    <button id="analyzeBtn" disabled class="w-full mt-4 bg-blue-600 text-white font-black py-3 rounded-xl hover:bg-slate-900 transition-all disabled:opacity-20 uppercase text-[10px] tracking-widest">Run Intelligence</button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-8" id="output">
                <div class="py-32 text-center text-slate-300 font-medium italic">Awaiting source material...</div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const levelButtons = document.querySelectorAll('.level-btn');
        const masteryContainer = document.getElementById('masteryContainer');
        const masteryPercent = document.getElementById('masteryPercent');
        const masteryBar = document.getElementById('masteryBar');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageData = [];
        let currentLevel = "1";
        let scoreTracker = {};

        levelButtons.forEach(btn => {
            btn.onclick = () => {
                levelButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.getAttribute('data-level');
            };
        });

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                analyzeBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        window.submitQuiz = (el, isCorrect, id, explanation) => {
            const parent = el.parentElement;
            if (parent.classList.contains('locked')) return;
            parent.classList.add('locked');

            const options = parent.querySelectorAll('.quiz-option');
            options.forEach(opt => {
                if (opt.getAttribute('data-correct') === 'true') opt.classList.add('show-correct');
            });

            if (!isCorrect) el.classList.add('selected-wrong');
            else scoreTracker[id] = true;

            const exp = document.getElementById(`exp-${id}`);
            exp.innerHTML = `<strong>Source Knowledge:</strong> ${explanation}`;
            exp.style.display = 'block';

            const score = Math.round((Object.keys(scoreTracker).length / pageData.length) * 100);
            masteryPercent.innerText = score + "%";
            masteryBar.style.width = score + "%";
            masteryContainer.classList.remove('hidden');
        };

        analyzeBtn.onclick = () => {
            output.innerHTML = "";
            pageData.forEach((page, index) => {
                // CONTENT EXTRACTION ENGINE
                const rawLines = page.text.split('. ').filter(l => l.length > 20);
                const keyFactLine = rawLines[1] || rawLines[0] || "General information";
                const keywords = keyFactLine.split(' ').slice(0, 3).join(" ");
                
                const card = document.createElement('div');
                card.className = "study-card p-10 mb-8 shadow-sm";
                
                let modeHTML = "";
                if (currentLevel === "3") {
                    modeHTML = `
                        <div class="mt-8 pt-8 border-t border-slate-50">
                            <h4 class="text-[10px] font-black text-blue-600 uppercase mb-6 tracking-[0.2em]">Knowledge Validation</h4>
                            <div class="bg-slate-50 p-8 rounded-3xl border border-slate-100">
                                <p class="text-sm font-bold text-slate-800 mb-6 leading-relaxed">According to the text, what is the significance or detail provided regarding "${keywords}..."?</p>
                                <div class="space-y-3">
                                    <div class="quiz-option" data-correct="true" onclick="submitQuiz(this, true, ${index}, '${keyFactLine.replace(/'/g, "\\'")}')">A) ${keyFactLine.substring(0, 80)}...</div>
                                    <div class="quiz-option" data-correct="false" onclick="submitQuiz(this, false, ${index}, '${keyFactLine.replace(/'/g, "\\'")}')">B) It is mentioned as a negligible factor with no specific detail provided.</div>
                                    <div class="quiz-option" data-correct="false" onclick="submitQuiz(this, false, ${index}, '${keyFactLine.replace(/'/g, "\\'")}')">C) The text suggests the opposite of this primary statement.</div>
                                </div>
                                <div id="exp-${index}" class="explanation-box mt-6 p-5 bg-white border border-blue-100 rounded-2xl text-[11px] text-blue-800 leading-relaxed font-medium hidden"></div>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[9px] font-black bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase tracking-tighter">Page ${page.num}</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-900 mb-4 tracking-tight">${keywords}...</h3>
                    <p class="text-slate-500 text-xs leading-relaxed mb-6 italic border-l-2 border-slate-100 pl-4">${page.text.substring(0, 300)}...</p>
                    ${modeHTML}
                `;
                output.appendChild(card);
            });
        };
    </script>
</body>
</html>
