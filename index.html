<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision Pro | Academic Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; color: #1e293b; transition: 0.3s; }
        
        #authOverlay, #pricingPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.99); backdrop-filter: blur(30px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        
        .modal-box {
            background: white; width: 90%; max-width: 420px; padding: 3rem;
            border-radius: 40px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.1);
            border: 1px solid #f1f5f9; text-align: center;
        }

        .credit-badge { background: #eff6ff; border: 1px solid #dbeafe; padding: 8px 16px; border-radius: 14px; font-size: 11px; font-weight: 800; color: #1d4ed8; cursor: pointer; }
        
        .price-card { background: white; border: 1px solid #f1f5f9; border-radius: 30px; padding: 2rem; transition: 0.3s; position: relative; }
        .price-card:hover { border-color: #3b82f6; transform: translateY(-5px); }

        .content-lock { filter: blur(20px); pointer-events: none; opacity: 0.1; transition: 0.5s; }
        
        /* High-Visibility X Button */
        .close-trigger { position: absolute; top: 40px; right: 40px; font-size: 32px; cursor: pointer; color: #cbd5e1; z-index: 10000; padding: 10px; }
        .close-trigger:hover { color: #ef4444; }

        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; padding: 2.5rem; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="authOverlay">
        <div class="modal-box">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl mx-auto mb-6">D</div>
            <h2 class="text-xl font-extrabold mb-8 uppercase tracking-tighter">System Access</h2>
            <button id="modalGoogleBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest">Sign in with Google</button>
            <div class="flex items-center gap-3 mt-8 mb-8 justify-center">
                <input type="checkbox" id="termsCheck" class="w-5 h-5 rounded accent-blue-600">
                <label for="termsCheck" class="text-[10px] font-extrabold text-slate-500 uppercase">Agree to Terms</label>
            </div>
            <button id="enterPlatformBtn" disabled class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase opacity-20">Enter Dashboard</button>
        </div>
    </div>

    <div id="pricingPage" class="hidden">
        <div class="close-trigger" onclick="closePricing()">✕</div>
        <div class="max-w-5xl w-full p-8 text-center">
            <h2 id="pTitle" class="text-4xl font-black mb-4 tracking-tighter">Store</h2>
            <p id="pSub" class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mb-16">Active subscription required for analysis</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="price-card">
                    <h3 class="text-slate-400 font-black text-[10px] uppercase mb-6">Basic</h3>
                    <div class="text-5xl font-black mb-2">5</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$35</div>
                    <button onclick="addCredits(5)" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Select</button>
                </div>
                
                <div class="price-card border-blue-500 shadow-2xl">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-1 rounded-full text-[8px] font-black uppercase">Most Popular</div>
                    <h3 class="text-blue-600 font-black text-[10px] uppercase mb-6">Academic</h3>
                    <div class="text-5xl font-black mb-2">25</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$98</div>
                    <button onclick="addCredits(25)" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase">Buy Now</button>
                </div>

                <div class="price-card">
                    <h3 class="text-slate-400 font-black text-[10px] uppercase mb-6">Expert</h3>
                    <div class="text-5xl font-black mb-2">100</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$290</div>
                    <button onclick="addCredits(100)" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Select</button>
                </div>
            </div>
            <button onclick="closePricing()" class="mt-16 text-slate-500 font-black text-[10px] uppercase tracking-widest border-b border-slate-200 pb-2">Return to Dashboard</button>
        </div>
    </div>

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl">D</div>
            <h1 class="text-lg font-black tracking-tighter">DocuVision <span class="text-blue-600 italic">Pro</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <button class="text-[10px] font-black text-slate-400 uppercase tracking-widest" onclick="openPricing()">Purchase Credits</button>
            <div class="credit-badge" onclick="openPricing()">
                CREDITS: <span id="creditDisplay">3</span>
            </div>
            <div id="userProfile" class="hidden">
                <img id="userPhoto" class="w-10 h-10 rounded-full border-2 border-white">
            </div>
        </div>
    </nav>

    <div id="mainWrapper">
        <div class="max-w-2xl mx-auto mb-16">
            <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[40px] bg-white flex items-center justify-between cursor-pointer">
                <div>
                    <p id="fileNameDisplay" class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Status: Ready</p>
                    <p class="text-sm font-bold text-slate-600">Upload Study Material</p>
                </div>
                <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-2xl disabled:opacity-10">Analyze (-1)</button>
                <input type="file" id="fileInput" class="hidden" accept=".pdf">
            </div>
        </div>
        <div id="output" class="max-w-3xl mx-auto space-y-8"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a", storageBucket: "docuvision-25f5a.firebasestorage.app", messagingSenderId: "438841299291", appId: "1:438841299291:web:d27751aff4bafdbcddca7e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // FIXED: START WITH 3 EVERY TIME
        let credits = 3;
        let pageData = [];
        let activeFileName = "";

        function openPricing() {
            const pPage = document.getElementById('pricingPage');
            const pTitle = document.getElementById('pTitle');
            const pSub = document.getElementById('pSub');
            
            pPage.classList.remove('hidden');
            
            if(credits <= 0) {
                pTitle.innerText = "Credits Exhausted";
                pSub.innerText = "Analysis features locked. Please purchase credits to continue.";
            } else {
                pTitle.innerText = "Store";
                pSub.innerText = "Purchase additional analysis capacity";
            }
        }

        function closePricing() {
            if (credits > 0) {
                document.getElementById('pricingPage').classList.add('hidden');
                document.getElementById('mainWrapper').classList.remove('content-lock');
            } else {
                alert("This feature isn't available for the AI and text analysis. Please purchase credits.");
            }
        }

        function addCredits(amt) {
            credits += amt;
            document.getElementById('creditDisplay').innerText = credits;
            // Immediate unlock upon purchase
            document.getElementById('mainWrapper').classList.remove('content-lock');
            document.getElementById('pricingPage').classList.add('hidden');
            if(pageData.length > 0) document.getElementById('analyzeBtn').disabled = false;
        }

        // Firebase Auth
        document.getElementById('termsCheck').onchange = (e) => {
            const btn = document.getElementById('enterPlatformBtn');
            btn.disabled = !e.target.checked;
            btn.style.opacity = e.target.checked ? "1" : "0.2";
        };
        document.getElementById('modalGoogleBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('enterPlatformBtn').onclick = () => { if(auth.currentUser) document.getElementById('authOverlay').style.display = 'none'; };
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });

        // PDF & Analyze
        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = (e) => { if(e.target.id !== 'analyzeBtn') fInput.click(); };
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            activeFileName = file.name.toLowerCase();
            document.getElementById('fileNameDisplay').innerText = `Loaded: ${file.name}`;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [1]; // Mock page data
                if(credits > 0) document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('analyzeBtn').onclick = () => {
            if (credits > 0) {
                credits--;
                document.getElementById('creditDisplay').innerText = credits;
                renderContent();
                if (credits <= 0) {
                    document.getElementById('mainWrapper').classList.add('content-lock');
                    openPricing();
                }
            } else {
                openPricing();
            }
        };

        function renderContent() {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const k = ["1815 Maryland context.", "Antebellum South hierarchy.", "Enslaved survival tactics.", "Modern Dana vs 1815 Maryland."];
            for(let i=0; i<4; i++){
                const card = document.createElement('div');
                card.className = "study-card mb-6";
                card.innerHTML = `<h3 class="text-blue-600 font-black text-[10px] mb-4 uppercase">Section 0${i+1}</h3>
                                  <p class="text-lg font-bold text-slate-800">${activeFileName.includes('kindred') ? k[i] : 'Analysis Generated.'}</p>`;
                out.appendChild(card);
            }
        }
    </script>
</body>
</html>
