<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Local Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .study-card { border-radius: 40px; background: white; border: 1px solid #f1f5f9; transition: 0.3s; }
        .quiz-opt { cursor: pointer; transition: 0.2s; border: 2px solid #f8fafc; border-radius: 20px; padding: 1.25rem; font-size: 0.85rem; display: flex; align-items: start; gap: 12px; margin-bottom: 0.75rem; }
        .quiz-opt:hover { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen font-sans text-slate-900">

    <header class="h-20 bg-white border-b flex justify-between items-center px-10 sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">DV</div>
            <h1 class="text-xs font-black uppercase tracking-tighter italic">DocuVision <span class="text-blue-600">Local Expert</span></h1>
        </div>
        <div class="text-[10px] font-bold text-emerald-500 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-100">Offline Mode Active</div>
    </header>

    <main class="max-w-4xl mx-auto p-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
            <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[40px] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 group transition-all">
                <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase">Drop PDF Here</p>
                <input type="file" id="fileInput" class="hidden" accept=".pdf">
            </div>
            <div class="md:col-span-2 bg-white p-10 rounded-[40px] border border-slate-100 flex items-center justify-between shadow-sm">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Processing Engine: <span class="text-blue-600">Contextual Scanner</span></p>
                <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-12 py-5 rounded-[24px] font-black text-xs uppercase shadow-2xl shadow-blue-200 hover:scale-105 active:scale-95 disabled:opacity-10 transition-all">Start Intelligence</button>
            </div>
        </div>
        <div id="output" class="space-y-12"></div>
    </main>

    <script>
        let pageData = [];
        const fInput = document.getElementById('fileInput');
        
        document.getElementById('dropZone').onclick = () => fInput.click();
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('analyzeBtn').onclick = () => {
            renderLocalContent(pageData);
        };

        function renderLocalContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const allSentences = data.flatMap(p => p.text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 40));

            data.forEach((page, index) => {
                const sentences = page.text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 25);
                
                // Finds a sentence with "logic words" like because, therefore, or since
                const logicMatch = sentences.find(s => s.match(/because|since|therefore|result|however|witnessed/i)) || sentences[0];
                
                // Smart Intro Builder: Cleans the first 7 words for the summary
                const cleanIntro = sentences[0] ? sentences[0].split(' ').slice(0, 7).join(' ').replace(/[,.;:]$/, "") : "this section";

                // Quiz Builder: Correct answer is from THIS page, wrong answer is from a random page
                const correct = sentences[0] || "Verified claim.";
                const wrong = allSentences.filter(s => !s.includes(cleanIntro))[Math.floor(Math.random() * 5)] || "General metadata.";
                const choices = [{ t: correct, c: true }, { t: wrong, c: false }].sort(() => Math.random() - 0.5);

                const card = document.createElement('div');
                card.className = "study-card p-12 mb-10";
                card.innerHTML = `
                    <div class="flex justify-between mb-8"><span class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase">PAGE ${page.num}</span></div>
                    <p class="text-slate-700 text-sm leading-relaxed mb-8 font-medium border-l-4 border-blue-600 pl-6 italic">"This section provides an analysis of **${cleanIntro}...** and examines the broader context of the narrative."</p>
                    <div class="bg-slate-900 p-8 rounded-[32px] text-white mb-8">
                        <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-4">Core Logic Point</p>
                        <p class="text-xs leading-relaxed font-bold">${logicMatch}.</p>
                    </div>
                    <div class="pt-8 border-t">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Evidence-Based Challenge</p>
                        <p class="text-xs font-bold text-slate-800 mb-6">Which of these specific claims is supported by the text on this page?</p>
                        ${choices.map(o => `
                            <div class="quiz-opt" onclick="this.style.borderColor='${o.c ? '#10b981' : '#ef4444'}'; this.style.background='${o.c ? '#f0fdf4' : '#fef2f2'}';">
                                <div class="w-5 h-5 rounded-full border-2 border-slate-200 mt-0.5 flex-shrink-0"></div>
                                <p class="text-slate-600 font-semibold leading-snug">${o.t}</p>
                            </div>`).join('')}
                    </div>`;
                out.appendChild(card);
            });
        }
    </script>
</body>
</html>
