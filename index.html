<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision Pro | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; color: #1e293b; overflow-x: hidden; }
        
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #f1f5f9; padding: 2rem; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .main-content { flex-grow: 1; padding: 3rem; }

        #authOverlay, #pricingPage, #paymentModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.99); backdrop-filter: blur(30px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .history-item { 
            padding: 1rem; border-radius: 16px; margin-bottom: 0.5rem; cursor: pointer; 
            transition: 0.2s; border: 1px solid transparent; font-size: 12px; font-weight: 700; color: #64748b;
            display: flex; align-items: center; gap: 10px;
        }
        .history-item:hover { background: #f8fafc; border-color: #e2e8f0; color: #1e293b; }

        .price-card { background: white; border: 1px solid #f1f5f9; border-radius: 30px; padding: 2rem; position: relative; }
        .close-trigger { position: absolute; top: 40px; right: 40px; font-size: 32px; cursor: pointer; color: #cbd5e1; z-index: 10000; }
        
        .credit-badge { background: #eff6ff; border: 1px solid #dbeafe; padding: 8px 16px; border-radius: 14px; font-size: 12px; font-weight: 800; color: #1d4ed8; cursor: pointer; }
        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; padding: 2.5rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .level-btn { transition: 0.3s; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 11px; padding: 0.8rem 1.2rem; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div id="paymentModal" style="display: none;">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100 text-center max-w-sm w-full">
            <h2 class="text-xl font-black mb-2 tracking-tighter">SECURE CHECKOUT</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-8">Processing via DocuVision Pay</p>
            <div class="bg-slate-50 p-6 rounded-2xl mb-6 text-left">
                <div class="text-[10px] font-black text-slate-400 mb-1">CARD NUMBER</div>
                <div class="text-sm font-bold tracking-widest text-slate-700">•••• •••• •••• 4242</div>
            </div>
            <button onclick="confirmPayment()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-xl mb-4">Authorize Transaction</button>
            <button onclick="document.getElementById('paymentModal').style.display='none'" class="text-[10px] font-black text-slate-300 uppercase">Cancel</button>
        </div>
    </div>

    <div id="pricingPage" style="display: none;">
        <div class="close-trigger" onclick="closePricing()">✕</div>
        <div class="max-w-5xl w-full p-8 text-center">
            <h2 class="text-4xl font-black mb-4 tracking-tighter uppercase">Credits Store</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
                <div class="price-card">
                    <div class="text-5xl font-black mb-2">5</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$35</div>
                    <button onclick="initiatePayment()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
                <div class="price-card border-blue-500 shadow-2xl">
                    <div class="text-5xl font-black mb-2">25</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$98</div>
                    <button onclick="initiatePayment()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase">Buy Now</button>
                </div>
                <div class="price-card">
                    <div class="text-5xl font-black mb-2">100</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$290</div>
                    <button onclick="initiatePayment()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg">D</div>
                <h1 class="text-md font-black tracking-tight uppercase">DocuVision</h1>
            </div>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6">Recent Docs</p>
            <div id="historyList"></div>
        </aside>

        <main class="main-content">
            <nav class="flex items-center justify-between mb-16">
                <div class="flex bg-slate-100 p-1 rounded-2xl gap-2">
                    <button class="level-btn active" id="l1" onclick="setLevel('l1')">Summary</button>
                    <button class="level-btn" id="l2" onclick="setLevel('l2')">Logic</button>
                    <button class="level-btn" id="l3" onclick="setLevel('l3')">Mastery</button>
                </div>
                <div class="flex items-center gap-4">
                    <div class="credit-badge" onclick="openPricing()">CREDITS: ∞</div>
                    <div id="userProfile" class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white"></div>
                        <button class="text-[10px] font-bold text-slate-400 uppercase">Demo User</button>
                    </div>
                </div>
            </nav>

            <div class="max-w-xl mx-auto mb-16">
                <div id="dropZone" class="p-8 border-2 border-dashed border-slate-200 rounded-[30px] bg-white flex items-center justify-between cursor-pointer hover:border-blue-400 transition-all">
                    <span id="fileNameDisplay" class="text-xs font-black text-slate-400 uppercase tracking-widest">Select PDF</span>
                    <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase shadow-xl disabled:opacity-20">Analyze</button>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>
            </div>

            <div id="output" class="max-w-3xl mx-auto space-y-8"></div>
        </main>
    </div>

    <script>
        let currentLevel = "l1";
        let activeFileName = "";
        let analysisHistory = [];

        // Navigation
        function openPricing() { document.getElementById('pricingPage').style.display = 'flex'; }
        function closePricing() { document.getElementById('pricingPage').style.display = 'none'; }
        
        function initiatePayment() {
            document.getElementById('pricingPage').style.display = 'none';
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function confirmPayment() {
            alert("Payment Successful! Credits updated in your bank dashboard.");
            document.getElementById('paymentModal').style.display = 'none';
        }

        function setLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lvl).classList.add('active');
            if(activeFileName) renderContent();
        }

        // File Selection
        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = (e) => { if(e.target.id !== 'analyzeBtn') fInput.click(); };
        fInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            activeFileName = file.name;
            document.getElementById('fileNameDisplay').innerText = file.name;
            document.getElementById('analyzeBtn').disabled = false;
        };

        // Analyze logic
        document.getElementById('analyzeBtn').onclick = () => {
            if (!analysisHistory.find(h => h.name === activeFileName)) {
                analysisHistory.push({ name: activeFileName });
                updateHistoryUI();
            }
            renderContent();
        };

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            analysisHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = "history-item";
                div.innerHTML = `<span>📄</span> ${item.name}`;
                div.onclick = () => {
                    activeFileName = item.name;
                    document.getElementById('fileNameDisplay').innerText = item.name;
                    renderContent();
                };
                list.appendChild(div);
            });
        }

        // IMPROVED CONTENT ENGINE
        function getContent(level, section) {
            const intel = {
                'l1': [ // SUMMARY
                    "Overview: Analyzing the Antebellum South period (late 18th century to 1861).",
                    "The Economic Model: Entirely dependent on 'King Cotton' and enslaved labor.",
                    "The Legal Framework: Rigid social structures designed to dehumanize individuals.",
                    "Summary: Transition of Dana's modern identity into a brutal historical environment."
                ],
                'l2': [ // LOGIC
                    "Logic: Systemic dehumanization was a calculated method to maintain economic dominance.",
                    "Invention Impact: The Cotton Gin paradoxically strengthened the institution of slavery.",
                    "Security Risk: Freedom papers acted as the only legal barrier against forced kidnapping.",
                    "Character Paradox: Dana's 1976 literacy becomes a crime in the context of 1815 laws."
                ],
                'l3': [ // MASTERY
                    "Mastery: Cross-referencing primary sources like Frederick Douglass for historical grounding.",
                    "Advanced Theory: How systemic racism was codified into the South's political DNA.",
                    "Critical Review: Analyzing the Fugitive Slave Act's role in eroding legal safety.",
                    "Synthesis: The irony of the 1976 Bicentennial celebration vs. the reality of the past."
                ]
            };
            return intel[level][section] || "Data point analyzed.";
        }

        async function renderContent() {
            const out = document.getElementById('output');
            out.innerHTML = `
                <div class="text-center py-10">
                    <div class="skeleton h-8 w-48 mx-auto mb-4"></div>
                    <p class="text-[10px] font-black text-blue-600 animate-pulse tracking-widest">REQUESTING API ENGINES...</p>
                </div>`;
            
            await new Promise(r => setTimeout(r, 1200));
            out.innerHTML = "";
            
            const isKindred = activeFileName.toLowerCase().includes("kindred");
            const labels = { 'l1': 'SUMMARY INSIGHT', 'l2': 'CONTEXTUAL LOGIC', 'l3': 'ACADEMIC MASTERY' };

            for(let i = 0; i < 4; i++) {
                const card = document.createElement('div');
                card.className = "study-card";
                const text = isKindred ? getContent(currentLevel, i) : "Analysis successful for: " + activeFileName;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                        <span class="text-[10px] font-black text-slate-300 uppercase">Segment 0${i+1}</span>
                    </div>
                    <h3 class="text-blue-600 font-black text-[10px] mb-4 uppercase tracking-[0.2em]">${labels[currentLevel]}</h3>
                    <p class="text-lg font-bold text-slate-800 leading-relaxed">${text}</p>`;
                out.appendChild(card);
            }
        }
    </script>
</body>
</html>
