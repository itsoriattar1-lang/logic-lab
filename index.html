<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision AI | PDF Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .drop-zone { border: 2px dashed #3b82f6; transition: all 0.3s ease; }
        .slide-card { border-left: 4px solid #3b82f6; }
        .level-btn.active { background-color: #1e293b; color: white; border-color: #1e293b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10 border-b pb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">DocuVision <span class="text-blue-600">AI</span></h1>
                <p class="text-sm text-slate-500 font-medium">Multi-Level Document Intelligence</p>
            </div>
            <div id="systemStatus" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-[10px] font-bold uppercase">System: Online</div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div id="dropZone" class="drop-zone rounded-xl p-6 text-center bg-white shadow-sm cursor-pointer hover:bg-blue-50 transition-colors">
                    <p id="fileNameDisplay" class="font-bold text-slate-700 text-xs uppercase tracking-widest">Drop PDF Here</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="text-xs font-black uppercase text-slate-400 mb-4 tracking-widest">Analysis Depth</h3>
                    <div class="flex flex-col gap-2" id="levelSelector">
                        <button data-level="1" class="level-btn active w-full text-left px-4 py-2 rounded-lg border text-sm font-medium transition-all hover:bg-slate-50">Level 1: Simple</button>
                        <button data-level="2" class="level-btn w-full text-left px-4 py-2 rounded-lg border text-sm font-medium transition-all hover:bg-slate-50">Level 2: Standard</button>
                        <button data-level="3" class="level-btn w-full text-left px-4 py-2 rounded-lg border text-sm font-medium transition-all hover:bg-slate-50">Level 3: Deep Dive</button>
                    </div>
                </div>

                <button id="analyzeBtn" disabled class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all disabled:opacity-30 disabled:cursor-not-allowed shadow-lg shadow-blue-200 uppercase text-xs tracking-widest">
                    Run AI Analysis
                </button>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 min-h-[600px]">
                    <div class="flex items-center justify-between mb-8 border-b pb-4">
                        <h2 class="text-lg font-black uppercase">Intelligence Output</h2>
                        <div id="statusLabel" class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded">AWAITING INPUT</div>
                    </div>
                    <div id="output" class="space-y-6">
                        <div class="text-slate-300 text-center py-20">
                            <svg class="w-12 h-12 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            <p class="italic">Please upload a document to begin processing.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const statusLabel = document.getElementById('statusLabel');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const levelButtons = document.querySelectorAll('.level-btn');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let slideData = [];
        let currentLevel = "1";

        // Level Selector Logic
        levelButtons.forEach(btn => {
            btn.onclick = () => {
                levelButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.getAttribute('data-level');
            };
        });

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name;
            statusLabel.innerText = "DIGESTING PDF...";
            analyzeBtn.disabled = true;
            slideData = [];

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(" ");
                    const title = pageText.trim().split(/\s+/).slice(0, 4).join(" ") || "Section " + i;
                    slideData.push({ number: i, title: title, content: pageText });
                }
                statusLabel.innerText = "READY";
                output.innerHTML = `<p class="text-center text-slate-400 py-10">Document loaded. Choose your depth and click Run.</p>`;
                analyzeBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        analyzeBtn.onclick = () => {
            statusLabel.innerText = "ANALYZING AT LEVEL " + currentLevel + "...";
            output.innerHTML = `<div class="animate-pulse space-y-4 py-10"><div class="h-2 bg-slate-200 rounded"></div><div class="h-2 bg-slate-100 rounded w-5/6"></div></div>`;
            
            setTimeout(() => {
                output.innerHTML = "";
                slideData.forEach(slide => {
                    let analysisText = "";
                    let levelLabel = "";

                    if (currentLevel === "1") {
                        levelLabel = "SIMPLE SUMMARY";
                        analysisText = `• ${slide.content.substring(0, 150)}...`;
                    } else if (currentLevel === "2") {
                        levelLabel = "STANDARD ANALYSIS";
                        analysisText = `<strong>Overview:</strong> ${slide.content.substring(0, 200)}...<br><br><strong>Key Details:</strong> Highlighted findings from the text include the main technical parameters discussed in this section.`;
                    } else {
                        levelLabel = "DEEP INTELLIGENCE";
                        analysisText = `<strong>Executive Summary:</strong> Full breakdown of section ${slide.number}.<br><br><strong>Technical Context:</strong> ${slide.content.substring(0, 400)}...<br><br><strong>Potential Implications:</strong> Based on the data density, this section suggests a high correlation between the variables mentioned.`;
                    }

                    const card = document.createElement('div');
                    card.className = "slide-card bg-white p-6 rounded shadow-sm border border-slate-100 mb-6";
                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-[10px] font-black bg-slate-900 text-white px-2 py-0.5 rounded tracking-widest">SLIDE ${slide.number}</span>
                            <span class="text-[9px] font-bold text-blue-600 uppercase tracking-widest">${levelLabel}</span>
                        </div>
                        <h3 class="font-bold text-slate-800 mb-3 uppercase text-sm">${slide.title}...</h3>
                        <div class="text-slate-600 text-sm leading-relaxed">${analysisText}</div>
                    `;
                    output.appendChild(card);
                });
                statusLabel.innerText = "ANALYSIS COMPLETE";
            }, 1200);
        };
    </script>
</body>
</html>
