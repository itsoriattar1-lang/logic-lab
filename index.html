<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision Pro | Demo Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; color: #1e293b; }
        
        /* The Store Overlay */
        #pricingPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.99); backdrop-filter: blur(30px);
            z-index: 9999; display: none; align-items: center; justify-content: center;
        }
        
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10001; display: flex; align-items: center; justify-content: center;
        }

        .price-card { background: white; border: 1px solid #f1f5f9; border-radius: 30px; padding: 2rem; transition: 0.3s; }
        .close-trigger { position: absolute; top: 40px; right: 40px; font-size: 40px; cursor: pointer; color: #1e293b; z-index: 10000; padding: 10px; font-weight: bold; }
        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; padding: 2.5rem; margin-bottom: 2rem; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="authOverlay">
        <div class="bg-white p-12 rounded-[40px] shadow-2xl border border-slate-100 text-center max-w-sm w-full">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl mx-auto mb-6">D</div>
            <h2 class="text-xl font-extrabold mb-8 uppercase">Demo Login</h2>
            <button id="modalGoogleBtn" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest">Sign in with Google</button>
            <button id="enterPlatformBtn" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg">Enter Dashboard</button>
        </div>
    </div>

    <div id="pricingPage">
        <div class="close-trigger" onclick="closePricing()">✕</div>
        <div class="max-w-5xl w-full p-8 text-center">
            <h2 class="text-4xl font-black mb-4 tracking-tighter">Buy Credits</h2>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mb-16">HKD Pricing Bundles</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="price-card">
                    <div class="text-5xl font-black mb-2">5</div>
                    <div class="text-2xl font-black text-blue-600 mb-6">HK$35</div>
                    <button onclick="closePricing()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
                <div class="price-card border-blue-500 shadow-xl">
                    <div class="text-5xl font-black mb-2">25</div>
                    <div class="text-2xl font-black text-blue-600 mb-6">HK$98</div>
                    <button onclick="closePricing()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
                <div class="price-card">
                    <div class="text-5xl font-black mb-2">100</div>
                    <div class="text-2xl font-black text-blue-600 mb-6">HK$290</div>
                    <button onclick="closePricing()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
            </div>
            <button onclick="closePricing()" class="mt-16 text-slate-500 font-black text-[10px] uppercase tracking-widest border-b border-slate-200 pb-2">Return to Dashboard</button>
        </div>
    </div>

    <nav class="max-w-6xl mx-auto flex justify-between items-center mb-16">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl">D</div>
            <h1 class="text-lg font-black tracking-tighter">DocuVision <span class="text-blue-600 italic">Pro</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <button class="text-[10px] font-black text-slate-400 uppercase tracking-widest" onclick="openPricing()">Buy Credits</button>
            <div class="bg-blue-50 border border-blue-100 px-4 py-2 rounded-xl text-[11px] font-bold text-blue-600">
                CREDITS: <span id="creditDisplay">999</span>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mb-16">
        <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[40px] bg-white flex items-center justify-between cursor-pointer hover:border-blue-400 transition-all">
            <div>
                <p id="fileNameDisplay" class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Demo Mode Active</p>
                <p class="text-sm font-bold text-slate-600">Click to upload Kindred PDF</p>
            </div>
            <button id="analyzeBtn" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-2xl">Analyze</button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf">
        </div>
    </div>
    <div id="output" class="max-w-3xl mx-auto"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a", storageBucket: "docuvision-25f5a.firebasestorage.app", messagingSenderId: "438841299291", appId: "1:438841299291:web:d27751aff4bafdbcddca7e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 1. NAVIGATION CONTROL
        function openPricing() {
            document.getElementById('pricingPage').style.display = 'flex';
        }

        function closePricing() {
            document.getElementById('pricingPage').style.display = 'none';
        }

        // 2. AUTH BYPASS
        document.getElementById('modalGoogleBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('enterPlatformBtn').onclick = () => {
            document.getElementById('authOverlay').style.display = 'none';
        };

        // 3. ANALYSIS LOGIC
        const fInput = document.getElementById('fileInput');
        let activeFileName = "";
        
        document.getElementById('dropZone').onclick = (e) => { if(e.target.id !== 'analyzeBtn') fInput.click(); };
        
        fInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                activeFileName = file.name.toLowerCase();
                document.getElementById('fileNameDisplay').innerText = `File: ${file.name}`;
            }
        };

        document.getElementById('analyzeBtn').onclick = () => {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const k = ["Historical Context: 1815 Maryland.", "Economic Impact of King Cotton.", "Social Hierarchy & Slave Laws.", "Contrast: Dana in 1976 vs 1815."];
            for(let i=0; i<4; i++){
                const card = document.createElement('div');
                card.className = "study-card";
                card.innerHTML = `<h3 class="text-blue-600 font-black text-[10px] mb-4 uppercase">Section 0${i+1}</h3>
                                  <p class="text-lg font-bold">${activeFileName.includes('kindred') ? k[i] : 'Processing complete.'}</p>`;
                out.appendChild(card);
            }
        };
    </script>
</body>
</html>
