<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision AI | Prep & Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .study-card { border-radius: 16px; border: 1px solid #e2e8f0; background: white; transition: all 0.3s ease; }
        .level-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .quiz-option { border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s; }
        .quiz-option:hover { border-color: #3b82f6; background: #eff6ff; }
        .quiz-option.correct { border-color: #10b981; background: #ecfdf5; }
        .quiz-option.wrong { border-color: #ef4444; background: #fef2f2; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-20">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8 border-b pb-6">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight italic">DOCU<span class="text-blue-600 not-italic">VISION</span></h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">Neural Test Prep Matrix</p>
            </div>
            <div id="quizScore" class="hidden px-4 py-1 bg-amber-100 text-amber-700 rounded-full text-xs font-bold">Prep Score: 0%</div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-4">
                <div id="dropZone" class="rounded-2xl p-6 text-center bg-white shadow-sm border-2 border-dashed border-slate-200 cursor-pointer">
                    <p id="fileNameDisplay" class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Load Source PDF</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>

                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest">Select Mode</h3>
                    <div class="space-y-2">
                        <button data-level="1" class="level-btn active w-full text-left px-4 py-3 rounded-xl border text-xs font-bold">QUICK SCAN</button>
                        <button data-level="3" class="level-btn w-full text-left px-4 py-3 rounded-xl border text-xs font-bold border-amber-200 text-amber-600">TEST PREP + QUIZ</button>
                    </div>
                </div>

                <button id="analyzeBtn" disabled class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-blue-600 transition-all disabled:opacity-20 uppercase text-[11px] tracking-[0.2em]">
                    Run Analysis
                </button>
            </div>

            <div class="lg:col-span-3 space-y-8" id="output">
                <div class="text-center py-32 border-2 border-dashed border-slate-200 rounded-3xl bg-white/50 text-slate-400">
                    Load a document to generate your study suite.
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const levelButtons = document.querySelectorAll('.level-btn');
        const quizScoreDisplay = document.getElementById('quizScore');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageData = [];
        let currentLevel = "1";
        let quizAnswers = {};

        levelButtons.forEach(btn => {
            btn.onclick = () => {
                levelButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.getAttribute('data-level');
            };
        });

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                analyzeBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        function generateQuiz(pageIndex, topic) {
            return `
                <div class="mt-6 p-6 bg-slate-50 rounded-xl border border-slate-200">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Practice Quiz: ${topic}</p>
                    <p class="text-sm font-bold text-slate-800 mb-4">Based on this section, what is the most critical factor to remember for the exam?</p>
                    <div class="space-y-2">
                        <div class="quiz-option p-3 rounded-lg text-sm" onclick="checkAnswer(this, true, ${pageIndex})">A) The primary structural mechanism of ${topic}</div>
                        <div class="quiz-option p-3 rounded-lg text-sm" onclick="checkAnswer(this, false, ${pageIndex})">B) A minor detail about the date of the document</div>
                        <div class="quiz-option p-3 rounded-lg text-sm" onclick="checkAnswer(this, false, ${pageIndex})">C) The names of the secondary contributors</div>
                    </div>
                </div>
            `;
        }

        window.checkAnswer = (el, isCorrect, id) => {
            if (el.parentElement.classList.contains('locked')) return;
            el.classList.add(isCorrect ? 'correct' : 'wrong');
            el.parentElement.classList.add('locked');
            quizAnswers[id] = isCorrect;
            const score = Math.round((Object.values(quizAnswers).filter(v => v).length / pageData.length) * 100);
            quizScoreDisplay.innerText = `Prep Score: ${score}%`;
            quizScoreDisplay.classList.remove('hidden');
        };

        analyzeBtn.onclick = () => {
            output.innerHTML = "";
            pageData.forEach((page, index) => {
                const words = page.text.trim().split(/\s+/);
                const topic = words.slice(0, 3).join(" ") || "General Topic";
                
                const card = document.createElement('div');
                card.className = "study-card mb-8 shadow-sm overflow-hidden p-8";
                
                let modeHTML = "";
                if (currentLevel === "3") {
                    modeHTML = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                            <div class="p-4 bg-amber-50 rounded-xl border border-amber-100">
                                <h4 class="text-[10px] font-black text-amber-600 uppercase mb-2">🔥 Exam Focus</h4>
                                <p class="text-xs text-slate-700 leading-relaxed font-bold">This section is vital for understanding ${topic}. Expect questions regarding the causal link between these variables.</p>
                            </div>
                            <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                                <h4 class="text-[10px] font-black text-blue-600 uppercase mb-2">💡 Key Takeaway</h4>
                                <p class="text-xs text-slate-600 leading-relaxed italic">Refine your study here by focusing on the "How" rather than the "What."</p>
                            </div>
                        </div>
                        ${generateQuiz(index, topic)}
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black bg-slate-900 text-white px-2 py-1 rounded">SECTION ${page.num}</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-4">${topic}...</h3>
                    <p class="text-slate-600 text-sm leading-relaxed mb-8">${page.text.substring(0, 300)}...</p>
                    ${modeHTML}
                `;
                output.appendChild(card);
            });
        };
    </script>
</body>
</html>
