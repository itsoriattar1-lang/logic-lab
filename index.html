<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Professional AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; color: #1e293b; }
        
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .modal-box {
            background: white; width: 90%; max-width: 420px; padding: 3rem;
            border-radius: 40px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.12);
            border: 1px solid #f1f5f9; text-align: center;
        }
        .login-option {
            width: 100%; padding: 1.1rem; border-radius: 16px; font-weight: 800;
            text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em;
            transition: 0.3s; margin-bottom: 0.8rem; display: flex; align-items: center; justify-content: center;
        }

        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: 0.3s ease; }
        .level-btn { transition: 0.3s; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 11px; padding: 1rem 1.5rem; border-radius: 14px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* FIXED QUIZ INTERACTION */
        .quiz-option { border: 2px solid #f1f5f9; padding: 1.2rem; border-radius: 16px; margin-top: 0.75rem; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 700; color: #cbd5e1; }
        .quiz-option:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: white; }
        .quiz-option.selected { border-color: #3b82f6; background: #3b82f6; color: white; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="authOverlay">
        <div class="modal-box">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl mx-auto mb-6 shadow-lg">D</div>
            <h2 class="text-xl font-black mb-2 tracking-tight text-slate-900 uppercase">System Access</h2>
            <p class="text-slate-400 font-bold text-[9px] uppercase tracking-[0.2em] mb-8">Professional Document Intelligence</p>
            
            <button id="modalGoogleBtn" class="login-option bg-slate-900 text-white hover:bg-black">Sign in with Google</button>
            <button class="login-option border border-slate-200 text-slate-400 cursor-not-allowed opacity-60">Email & Password</button>
            
            <p class="text-[8px] font-black text-slate-300 uppercase italic mt-2 mb-8 text-center w-full">Working on adding more login options...</p>
            
            <div class="flex items-center gap-3 mb-8 justify-start">
                <input type="checkbox" id="termsCheck" class="w-5 h-5 rounded accent-blue-600 cursor-pointer">
                <label for="termsCheck" class="text-[10px] font-extrabold text-slate-500 cursor-pointer uppercase tracking-tight">I agree to terms & conditions</label>
            </div>

            <button id="enterPlatformBtn" disabled class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] shadow-xl opacity-20 transition-all">Enter Platform</button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">D</div>
            <h1 class="text-lg font-black tracking-tight">DocuVision <span class="text-blue-600 italic">Pro</span></h1>
        </div>
        
        <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2">
            <button class="level-btn active" id="l1">Quick Summary</button>
            <button class="level-btn" id="l2">Logic & Why</button>
            <button class="level-btn" id="l3">Deep Mastery</button>
        </div>

        <div id="authSection" class="flex items-center gap-4">
            <div id="userProfile" class="hidden flex items-center gap-3">
                <img id="userPhoto" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
                <button id="logoutBtn" class="text-[10px] font-bold text-red-400 uppercase">Exit</button>
            </div>
        </div>
    </nav>

    <div class="max-w-xl mx-auto mb-16">
        <div id="dropZone" class="p-8 border-2 border-dashed border-slate-200 rounded-[30px] bg-white flex items-center justify-between cursor-pointer hover:border-blue-400 transition-all group">
            <span id="fileNameDisplay" class="text-xs font-black text-slate-400 uppercase tracking-widest">Select PDF</span>
            <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-xl disabled:opacity-20 transition-all">Analyze</button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf">
        </div>
    </div>

    <div id="output" class="max-w-3xl mx-auto space-y-8"></div>
    <div id="quizContainer" class="max-w-3xl mx-auto mt-16 hidden"></div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a", storageBucket: "docuvision-25f5a.firebasestorage.app", messagingSenderId: "438841299291", appId: "1:438841299291:web:d27751aff4bafdbcddca7e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let pageData = [];
        let currentLevel = "l1";
        const HF_TOKEN = "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";

        const termsCheck = document.getElementById('termsCheck');
        const enterPlatformBtn = document.getElementById('enterPlatformBtn');
        const authOverlay = document.getElementById('authOverlay');

        termsCheck.onchange = () => {
            enterPlatformBtn.disabled = !termsCheck.checked;
            enterPlatformBtn.style.opacity = termsCheck.checked ? "1" : "0.2";
        };

        document.getElementById('modalGoogleBtn').onclick = () => {
            if(!termsCheck.checked) return alert("Please accept the terms.");
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        };

        enterPlatformBtn.onclick = () => { if(auth.currentUser) authOverlay.style.display = 'none'; };

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
                if(termsCheck.checked) authOverlay.style.display = 'none';
            } else {
                document.getElementById('userProfile').classList.add('hidden');
                authOverlay.style.display = 'flex';
            }
        });

        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = (e) => { if(e.target.id !== 'analyzeBtn') fInput.click(); };
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        async function fetchAI(text) {
            const cleanInput = text.replace(/\s+/g, ' ').substring(0, 1000);
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
                    headers: { Authorization: "Bearer " + HF_TOKEN },
                    method: "POST",
                    body: JSON.stringify({ inputs: cleanInput })
                });
                const result = await response.json();
                let summary = result[0]?.summary_text || "Analysis complete.";
                // FIX: Removes common AI artifacts like "A)", "B:", or "Option 1"
                return summary.replace(/^[A-Z][\)|:|\-]\s*/g, '').replace(/\s[A-Z][\)|:|\-]\s*/g, ' ').trim();
            } catch {
                return text.split(/[.!?]/).slice(0, 2).join(". ") + ".";
            }
        }

        document.getElementById('analyzeBtn').onclick = () => renderContent(pageData);

        async function renderContent(data) {
            const out = document.getElementById('output');
            const quizOut = document.getElementById('quizContainer');
            out.innerHTML = "";
            quizOut.innerHTML = "";
            quizOut.classList.add('hidden');
            let fullDocContext = "";

            for(const page of data.slice(0, 5)) { // Limit to 5 pages for speed in class
                const card = document.createElement('div');
                card.className = "study-card p-10 mb-8";
                card.innerHTML = `<div class="h-4 w-full skeleton mb-2"></div><div class="h-4 w-2/3 skeleton"></div>`;
                out.appendChild(card);

                const aiText = await fetchAI(page.text);
                fullDocContext += aiText + " ";
                
                let html = "";
                if (currentLevel === "l1") {
                    html = `<h3 class="text-blue-600 font-black text-[10px] mb-4">SUMMARY</h3><p class="text-lg font-bold">${aiText.split('.')[0]}.</p>`;
                } else if (currentLevel === "l2") {
                    html = `<h3 class="text-emerald-600 font-black text-[10px] mb-4">CAUSAL LOGIC</h3><p class="text-lg font-bold italic">"${aiText}"</p>`;
                } else {
                    html = `<h3 class="text-purple-600 font-black text-[10px] uppercase mb-4 tracking-widest">DEEP ANALYSIS</h3><p class="text-md font-bold leading-relaxed text-slate-700">${aiText}</p>`;
                }

                card.innerHTML = `<div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                    <span class="text-[10px] font-black text-slate-300 tracking-tighter">SECTION ${page.num}</span>
                    <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                </div>${html}`;
            }

            if (currentLevel === "l3") renderQuiz(fullDocContext);
        }

        function renderQuiz(context) {
            const quizOut = document.getElementById('quizContainer');
            quizOut.classList.remove('hidden');
            quizOut.innerHTML = `<div class="bg-slate-900 p-12 rounded-[40px] text-white shadow-2xl"><h2 class="text-blue-400 font-black text-xs uppercase tracking-[0.3em] mb-8 text-center">Final Mastery Exam</h2><div id="quizList" class="space-y-10"></div></div>`;
            
            const words = context.split(' ').filter(w => w.length > 8).slice(0, 3);
            words.forEach((word, i) => {
                const cleanWord = word.replace(/[^a-zA-Z]/g, "").toUpperCase();
                const q = document.createElement('div');
                q.className = "quiz-block";
                q.innerHTML = `<p class="text-lg font-bold mb-4">${i+1}. How does the theme of "${cleanWord}" function as a catalyst in this text?</p>
                    <div class="grid grid-cols-1 gap-2">
                        <div class="quiz-option" onclick="this.parentElement.querySelectorAll('.quiz-option').forEach(o=>o.classList.remove('selected')); this.classList.add('selected')">It serves as the structural foundation for the subsequent narrative shift.</div>
                        <div class="quiz-option" onclick="this.parentElement.querySelectorAll('.quiz-option').forEach(o=>o.classList.remove('selected')); this.classList.add('selected')">It provides a localized counter-argument to the primary thesis.</div>
                        <div class="quiz-option" onclick="this.parentElement.querySelectorAll('.quiz-option').forEach(o=>o.classList.remove('selected')); this.classList.add('selected')">It acts as a symbolic bridge between the historical and modern contexts.</div>
                    </div>`;
                document.getElementById('quizList').appendChild(q);
            });
        }
    </script>
</body>
</html>
