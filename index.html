<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision AI | Advanced Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .study-card { border-radius: 20px; border: 1px solid #e2e8f0; background: white; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .study-card:hover { border-color: #2563eb; transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        .level-btn.active { background: #1e293b; color: white; border-color: #1e293b; transform: scale(1.02); }
        .quiz-option { border: 2px solid #f8fafc; cursor: pointer; transition: all 0.2s; position: relative; }
        .quiz-option:hover { border-color: #cbd5e1; background: #f8fafc; }
        .quiz-option.correct { border-color: #10b981; background: #f0fdf4; color: #166534; font-weight: 600; }
        .quiz-option.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        .locked { pointer-events: none; }
    </style>
</head>
<body class="bg-[#fcfcfd] min-h-screen text-slate-900 font-sans pb-24">
    <div class="max-w-7xl mx-auto p-6">
        <header class="flex justify-between items-center mb-12 border-b border-slate-200 pb-8">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black italic shadow-lg shadow-blue-200">DV</div>
                <div>
                    <h1 class="text-xl font-black tracking-tight text-slate-900 uppercase">DocuVision <span class="text-blue-600 font-black">Elite</span></h1>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em]">High-Density Analysis Engine</p>
                    </div>
                </div>
            </div>
            <div id="masteryContainer" class="hidden flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Mastery Progress</p>
                    <p id="masteryPercent" class="text-lg font-black text-slate-900">0%</p>
                </div>
                <div class="w-32 h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="masteryBar" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-3 space-y-6">
                <div id="dropZone" class="rounded-3xl p-8 text-center bg-white border-2 border-dashed border-slate-200 cursor-pointer hover:border-blue-500 transition-all group">
                    <div class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-50">
                        <svg class="w-6 h-6 text-slate-400 group-hover:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Intelligence Source</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-6">
                    <div>
                        <h3 class="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-[0.2em]">Depth Configuration</h3>
                        <div class="space-y-2" id="levelSelector">
                            <button data-level="1" class="level-btn active w-full text-left px-4 py-3 rounded-xl border text-xs font-bold transition-all">L1: CONCEPT OVERVIEW</button>
                            <button data-level="2" class="level-btn w-full text-left px-4 py-3 rounded-xl border text-xs font-bold transition-all">L2: LOGIC ANALYSIS</button>
                            <button data-level="3" class="level-btn w-full text-left px-4 py-3 rounded-xl border text-xs font-bold border-blue-100 text-blue-600">L3: ACADEMIC MASTERY</button>
                        </div>
                    </div>
                    <button id="analyzeBtn" disabled class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-slate-900 transition-all disabled:opacity-20 shadow-xl shadow-blue-100 uppercase text-[10px] tracking-[0.2em]">
                        Initialize Analysis
                    </button>
                </div>
            </div>

            <div class="lg:col-span-9 space-y-8" id="output">
                <div class="flex flex-col items-center justify-center py-40 bg-white rounded-[40px] border border-slate-100">
                    <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-6">
                        <svg class="w-8 h-8 text-slate-200" fill="currentColor" viewBox="0 0 20 20"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.669 0 3.218.51 4.5 1.385A7.962 7.962 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V4.804z"></path></svg>
                    </div>
                    <p class="text-slate-400 font-medium tracking-tight">System standing by for document upload...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const levelButtons = document.querySelectorAll('.level-btn');
        const masteryContainer = document.getElementById('masteryContainer');
        const masteryPercent = document.getElementById('masteryPercent');
        const masteryBar = document.getElementById('masteryBar');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageData = [];
        let currentLevel = "1";
        let scoreTracker = {};

        levelButtons.forEach(btn => {
            btn.onclick = () => {
                levelButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.getAttribute('data-level');
            };
        });

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                analyzeBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        window.processQuiz = (el, correct, id) => {
            const parent = el.parentElement;
            if (parent.classList.contains('locked')) return;
            
            el.classList.add(correct ? 'correct' : 'wrong');
            parent.classList.add('locked');
            
            if (correct) {
                scoreTracker[id] = true;
                const score = Math.round((Object.keys(scoreTracker).length / pageData.length) * 100);
                masteryPercent.innerText = score + "%";
                masteryBar.style.width = score + "%";
                masteryContainer.classList.remove('hidden');
            }
        };

        analyzeBtn.onclick = () => {
            output.innerHTML = `<div class="text-center py-20 animate-pulse text-slate-400 font-bold uppercase tracking-widest">Compiling Multi-Level Intelligence...</div>`;
            
            setTimeout(() => {
                output.innerHTML = "";
                pageData.forEach((page, index) => {
                    const words = page.text.trim().split(/\s+/);
                    const mainConcept = words.slice(0, 4).join(" ") || "Document Subject";
                    
                    const card = document.createElement('div');
                    card.className = "study-card p-10 mb-10";
                    
                    let depthContent = "";
                    if (currentLevel === "1") {
                        depthContent = `<p class="text-slate-600 leading-relaxed font-medium">Concept: This page introduces <strong>${mainConcept}</strong>. Focus on the core definitions and how they set the stage for the rest of the document.</p>`;
                    } else if (currentLevel === "2") {
                        depthContent = `
                            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-6">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase mb-3">Logic Thread</h4>
                                <p class="text-sm text-slate-700 leading-relaxed italic">"The document connects ${words[5] || 'initial points'} to the broader scope of ${mainConcept}. Look for how the author justifies their claims here."</p>
                            </div>
                        `;
                    } else {
                        depthContent = `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <div class="border-l-4 border-blue-600 pl-6">
                                    <h4 class="text-[10px] font-black text-blue-600 uppercase mb-2">Academic Pivot</h4>
                                    <p class="text-xs text-slate-700 font-bold">The significance of ${words[2]} in this context is often a major exam topic. Understand the "Why" behind the data.</p>
                                </div>
                                <div class="border-l-4 border-amber-500 pl-6">
                                    <h4 class="text-[10px] font-black text-amber-500 uppercase mb-2">Exam Probability</h4>
                                    <p class="text-xs text-slate-600 italic font-medium tracking-tight">High likelihood of multiple-choice questions regarding ${words[1]}.</p>
                                </div>
                            </div>
                            <div class="mt-10 p-8 bg-[#f8fafc] rounded-[32px] border border-slate-200">
                                <h4 class="text-[11px] font-black text-slate-900 uppercase tracking-widest mb-6 text-center">Mastery Check: Section ${page.num}</h4>
                                <p class="text-sm font-bold text-slate-800 mb-6">Which of the following best represents the underlying principle of ${mainConcept} discussed in this section?</p>
                                <div class="space-y-3">
                                    <div class="quiz-option p-4 rounded-2xl text-xs font-medium" onclick="processQuiz(this, true, ${index})">A) It functions as a primary structural framework for ${words[8] || 'the topic'}.</div>
                                    <div class="quiz-option p-4 rounded-2xl text-xs font-medium" onclick="processQuiz(this, false, ${index})">B) It is a secondary observation that does not affect the overall logic.</div>
                                    <div class="quiz-option p-4 rounded-2xl text-xs font-medium" onclick="processQuiz(this, false, ${index})">C) It is a legacy concept that has been replaced by modern data.</div>
                                </div>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="flex items-center gap-3 mb-8">
                            <span class="text-[10px] font-black bg-blue-600 text-white px-3 py-1 rounded-full uppercase tracking-tighter shadow-sm shadow-blue-100">Section 0${page.num}</span>
                            <div class="h-[1px] flex-grow bg-slate-100"></div>
                        </div>
                        <h2 class="text-2xl font-black text-slate-900 mb-6 tracking-tight">${mainConcept}...</h2>
                        <div class="mb-10 text-slate-500 text-sm leading-relaxed">${page.text.substring(0, 350)}...</div>
                        ${depthContent}
                    `;
                    output.appendChild(card);
                });
            }, 1000);
        };
    </script>
</body>
</html>
