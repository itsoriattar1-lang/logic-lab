<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; }
        
        /* THE MODAL OVERLAY */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-center;
        }
        .modal-box {
            background: white; width: 90%; max-width: 450px; padding: 3rem;
            border-radius: 40px; box-shadow: 0 50px 100px -20px rgba(0,0,0,0.15);
            border: 1px solid #f1f5f9; text-align: center;
        }
        .login-btn {
            width: 100%; padding: 1.2rem; border-radius: 18px; font-weight: 800;
            text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em;
            transition: 0.3s; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <div id="authOverlay">
        <div class="modal-box">
            <div class="w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-black text-2xl mx-auto mb-6 shadow-xl">D</div>
            <h2 class="text-2xl font-extrabold mb-2 tracking-tight text-slate-900">Welcome to DocuVision</h2>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-10">Advanced AI Document Intelligence</p>
            
            <button id="googleLogin" class="login-btn bg-slate-900 text-white hover:bg-black">
                <span>Sign in with Google</span>
            </button>
            
            <button class="login-btn border border-slate-200 text-slate-600 hover:bg-slate-50 cursor-not-allowed opacity-50">
                <span>Email & Password</span>
            </button>
            
            <p class="text-[9px] font-bold text-slate-300 uppercase italic mt-2 mb-8">Working on adding more login options...</p>
            
            <div class="flex items-center gap-3 mb-8 justify-start">
                <input type="checkbox" id="termsCheck" class="w-5 h-5 rounded accent-blue-600 cursor-pointer">
                <label for="termsCheck" class="text-[11px] font-bold text-slate-500 cursor-pointer">I agree to the Terms and Conditions</label>
            </div>

            <button id="enterBtn" disabled class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-2xl shadow-blue-200 opacity-20 transition-all">Enter Platform</button>
        </div>
    </div>

    <nav class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 mb-16">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">D</div>
            <h1 class="text-lg font-black tracking-tight">DocuVision <span class="text-blue-600 italic">Enterprise</span></h1>
        </div>
        <div id="userProfile" class="flex items-center gap-3 bg-white p-2 pr-6 rounded-full border border-slate-100 shadow-sm">
            <img id="userPhoto" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
            <span id="userName" class="text-[10px] font-black uppercase text-slate-700">Guest</span>
        </div>
    </nav>

    <div class="max-w-xl mx-auto mb-16 text-center">
        <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2 mb-8 w-fit mx-auto">
            <button class="px-6 py-3 rounded-xl font-extrabold text-[10px] uppercase bg-blue-600 text-white">Quick Summary</button>
            <button class="px-6 py-3 rounded-xl font-extrabold text-[10px] uppercase text-slate-400">Deep Mastery</button>
        </div>
        
        <div id="dropZone" class="p-8 border-2 border-dashed border-slate-200 rounded-[30px] bg-white flex items-center justify-between cursor-pointer">
            <span id="fileNameDisplay" class="text-xs font-black text-slate-400 uppercase">Load Source</span>
            <button id="analyzeBtn" disabled class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase">Analyze</button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf">
        </div>
    </div>

    <div id="output" class="max-w-3xl mx-auto space-y-8"></div>

    <script>
        // CONFIG
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const termsCheck = document.getElementById('termsCheck');
        const enterBtn = document.getElementById('enterBtn');
        const authOverlay = document.getElementById('authOverlay');

        // ENABLE BUTTON ON CHECKBOX
        termsCheck.onchange = () => {
            enterBtn.disabled = !termsCheck.checked;
            enterBtn.style.opacity = termsCheck.checked ? "1" : "0.2";
        };

        // LOGIN FLOW
        document.getElementById('googleLogin').onclick = () => {
            if(!termsCheck.checked) return alert("Please agree to the terms first.");
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(result => {
                document.getElementById('userPhoto').src = result.user.photoURL;
                document.getElementById('userName').innerText = result.user.displayName;
                authOverlay.style.display = 'none'; // Hide the modal
            });
        };

        enterBtn.onclick = () => {
            if(!auth.currentUser) {
                alert("Please sign in with Google to enter the platform.");
            } else {
                authOverlay.style.display = 'none';
            }
        };

        // --- PDF ENGINE (Keeping your existing logic) ---
        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = (e) => { if(e.target.id !== 'analyzeBtn') fInput.click(); };
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                document.getElementById('analyzeBtn').disabled = false;
                // Logic continues...
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
