<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Complete Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .study-card { border-radius: 40px; background: white; border: 1px solid #f1f5f9; transition: 0.3s; }
        .level-btn { transition: 0.2s; border: 1px solid #e2e8f0; cursor: pointer; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .quiz-opt { cursor: pointer; transition: 0.2s; border: 2px solid #f8fafc; border-radius: 20px; padding: 1.25rem; font-size: 0.85rem; display: flex; align-items: start; gap: 12px; margin-bottom: 0.75rem; }
        .history-item { cursor: pointer; transition: 0.2s; border-radius: 12px; margin-bottom: 8px; border: 1px solid #f1f5f9; padding: 1rem; }
        .history-item:hover { background: #f8fafc; border-color: #3b82f6; transform: translateX(5px); }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen font-sans text-slate-900 flex flex-col">

    <header class="h-20 bg-white border-b flex justify-between items-center px-10 sticky top-0 z-50">
        <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">DV</div>
            <h1 class="text-xs font-black uppercase tracking-tighter italic">DocuVision <span class="text-blue-600">Narrative</span></h1>
        </div>
        <div id="userProfile" class="hidden flex items-center gap-3">
            <img id="userPhoto" class="w-9 h-9 rounded-full border-2 border-white shadow-sm">
            <button id="logoutBtn" class="text-[9px] font-black text-slate-400 uppercase">Logout</button>
        </div>
        <button id="loginBtn" class="bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-600">Sign In</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 bg-white border-r flex flex-col p-8 hidden lg:flex">
            <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] mb-8">Personal Archive</h3>
            <div id="historyList" class="flex-1 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                    <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[40px] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 group transition-all">
                        <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Select Source</p>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf">
                    </div>
                    
                    <div class="md:col-span-2 bg-white p-10 rounded-[40px] border border-slate-100 flex flex-col justify-between shadow-sm">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-5 tracking-widest">Cognitive Depth</h3>
                                <div class="flex gap-4">
                                    <button class="level-btn active px-8 py-3 rounded-2xl text-[10px] font-black uppercase" id="l1">L1: Summary</button>
                                    <button class="level-btn px-8 py-3 rounded-2xl text-[10px] font-black uppercase" id="l2">L2: Logic</button>
                                    <button class="level-btn px-8 py-3 rounded-2xl text-[10px] font-black uppercase" id="l3">L3: Mastery</button>
                                </div>
                            </div>
                            <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-12 py-5 rounded-[24px] font-black text-xs uppercase shadow-2xl shadow-blue-200 hover:scale-105 active:scale-95 disabled:opacity-10">Start Engine</button>
                        </div>
                    </div>
                </div>
                <div id="output" class="space-y-12"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA",
            authDomain: "docuvision-25f5a.firebaseapp.com",
            projectId: "docuvision-25f5a",
            storageBucket: "docuvision-25f5a.firebasestorage.app",
            messagingSenderId: "438841299291",
            appId: "1:438841299291:web:d27751aff4bafdbcddca7e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentLevel = "l1";
        let pageData = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
                loadHistory(user.uid);
            }
        });

        document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => location.reload());

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.id;
            };
        });

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = () => fInput.click();
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('analyzeBtn').onclick = () => {
            renderContent(pageData);
            saveToCloud();
        };

        function renderContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            
            // SKIPPING PAGE 1: We start from index 1 (Page 2)
            const realData = data.slice(1);
            const allSentences = data.flatMap(p => p.text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 40));

            realData.forEach((page, index) => {
                const sentences = page.text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 25);
                const logicPoint = sentences.find(s => s.match(/because|since|therefore|result|however|witnessed/i)) || sentences[0];
                const cleanIntro = sentences[0] ? sentences[0].split(' ').slice(0, 7).join(' ').replace(/[,.;:]$/, "") : "this section";

                const card = document.createElement('div');
                card.className = "study-card p-12 mb-10";
                
                let inner = "";
                if (currentLevel === "l1") {
                    inner = `<p class="text-slate-700 text-[14px] font-medium leading-relaxed border-l-4 border-blue-600 pl-6 italic">"This page explores the concepts surrounding **${cleanIntro}...** and provides thematic context for the chapter."</p>`;
                } else if (currentLevel === "l2") {
                    inner = `<div class="bg-slate-900 p-8 rounded-[32px] text-white">
                                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-4">Logic Breakdown</p>
                                <p class="text-xs font-bold leading-relaxed text-blue-50">${logicPoint}.</p>
                             </div>`;
                } else {
                    const correct = sentences[0] || "Primary source evidence.";
                    const wrong = allSentences.filter(s => !s.includes(cleanIntro))[Math.floor(Math.random() * 8)] || "Secondary data point.";
                    const choices = [{ t: correct, c: true }, { t: wrong, c: false }].sort(() => Math.random() - 0.5);

                    inner = `
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Evidence Verification (Page ${page.num})</p>
                        <p class="text-xs font-bold text-slate-800 mb-6">Which of these specific claims is factually supported by this section?</p>
                        ${choices.map(o => `
                            <div class="quiz-opt" onclick="this.style.borderColor='${o.c ? '#10b981' : '#ef4444'}'; this.style.background='${o.c ? '#f0fdf4' : '#fef2f2'}';">
                                <p class="text-slate-600 font-semibold leading-relaxed">${o.t}</p>
                            </div>`).join('')}
                    `;
                }

                card.innerHTML = `<div class="flex justify-between items-center mb-10 text-[10px] font-black uppercase tracking-widest text-slate-300">
                                    <span class="bg-blue-600 text-white px-4 py-1.5 rounded-full">PAGE ${page.num}</span>
                                    <span>Engine Verified Thread</span>
                                 </div>${inner}`;
                out.appendChild(card);
            });
        }

        async function saveToCloud() {
            const user = auth.currentUser;
            if (user) {
                await db.collection('users').doc(user.uid).collection('history').add({
                    fileName: document.getElementById('fileNameDisplay').innerText,
                    data: pageData,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                loadHistory(user.uid);
            }
        }

        async function loadHistory(uid) {
            const snap = await db.collection('users').doc(uid).collection('history').orderBy('timestamp', 'desc').limit(10).get();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const item = document.createElement('div');
                item.className = "history-item text-[10px] font-bold uppercase truncate";
                item.innerText = doc.data().fileName;
                item.onclick = () => { pageData = doc.data().data; renderContent(pageData); };
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
