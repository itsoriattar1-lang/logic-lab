<script>
document.getElementById('analyzeBtn').onclick = async () => {
    const out = document.getElementById('output');
    out.innerHTML = "<div class='text-center animate-pulse py-10 font-black text-blue-600 uppercase text-xs tracking-widest'>Sifting through Data Layers...</div>";
    
    setTimeout(() => {
        out.innerHTML = "";
        pageData.forEach((page, index) => {
            const text = page.text;
            
            // 1. REFINEMENT: Extract "Intellectual Triggers"
            const dates = text.match(/\b(17|18|19|20)\d{2}\b/g) || [];
            const definitions = text.match(/([^.!?]+ (is defined as|refers to|means|is the) [^.!?]+)/gi) || [];
            const conclusions = text.match(/(therefore|consequently|as a result|because|leads to)[^.!?]+/gi) || [];
            
            // 2. DATA PICKING
            const primaryPoint = definitions[0] || conclusions[0] || text.split('. ')[0];
            const uniqueDates = [...new Set(dates)].slice(0, 3);
            
            const card = document.createElement('div');
            card.className = "study-card p-10 shadow-sm mb-8 animate-in fade-in slide-in-from-bottom-4 duration-500";
            
            let html = "";

            if (currentLevel === "simple") {
                html = `
                    <div class="space-y-4">
                        <p class="text-slate-600 text-sm leading-relaxed border-l-4 border-blue-500 pl-6 font-medium">${primaryPoint}.</p>
                        ${uniqueDates.length > 0 ? `<div class="flex gap-2 mt-4">${uniqueDates.map(d => `<span class="bg-blue-50 text-blue-600 text-[9px] font-bold px-2 py-1 rounded-md">REF: ${d}</span>`).join('')}</div>` : ''}
                    </div>`;
            } 
            else if (currentLevel === "logic") {
                const logicPoint = conclusions[0] || "No clear causal logic detected on this page.";
                html = `
                    <div class="bg-slate-900 p-8 rounded-[32px] text-white">
                        <h4 class="text-[9px] font-black text-blue-400 uppercase mb-3 tracking-widest">Logic & Causality</h4>
                        <p class="text-xs leading-relaxed opacity-90">${logicPoint}.</p>
                        <div class="mt-4 pt-4 border-t border-white/10 flex items-center justify-between">
                            <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Contextual Link</span>
                            <span class="text-[9px] opacity-40 uppercase tracking-widest">Ver. 2.5 Engine</span>
                        </div>
                    </div>`;
            } 
            else {
                const choices = [
                    { t: primaryPoint, c: true },
                    { t: "This section primarily focuses on unrelated statistical data.", c: false }
                ].sort(() => Math.random() - 0.5);

                html = `
                    <div class="space-y-4">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Evidence-Based Challenge</h4>
                        <p class="text-xs font-bold text-slate-800">Identify the verified claim made in this section:</p>
                        ${choices.map(o => `<div class="quiz-opt border-2 border-slate-100 hover:border-blue-500 p-4 rounded-2xl cursor-pointer text-xs transition-all" onclick="check(this, ${o.c}, ${index})">${o.t}</div>`).join('')}
                        <div id="check-${index}" class="hidden mt-4 p-4 bg-blue-600 text-white rounded-2xl text-[10px] font-mono">CONFIRMED DATA: ${primaryPoint}</div>
                    </div>`;
            }

            card.innerHTML = `
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-black text-slate-900 uppercase tracking-widest tracking-tighter">Data Stream: Page ${page.num}</span>
                    </div>
                </div>
                ${html}`;
            out.appendChild(card);
        });
        
        saveHistory(document.getElementById('fileNameDisplay').innerText);
    }, 1000);
};
</script>
