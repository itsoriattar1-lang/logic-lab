<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision Pro | Advanced Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; color: #1e293b; overflow-x: hidden; }
        
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #f1f5f9; padding: 2rem; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
        .main-content { flex-grow: 1; padding: 3rem; }

        #authOverlay, #pricingPage {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.99); backdrop-filter: blur(30px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .history-item { 
            padding: 1rem; border-radius: 16px; margin-bottom: 0.5rem; cursor: pointer; 
            transition: 0.2s; border: 1px solid transparent; font-size: 13px; font-weight: 700; color: #64748b;
            display: flex; align-items: center; gap: 10px;
        }
        .history-item:hover { background: #f8fafc; border-color: #e2e8f0; color: #1e293b; }

        .price-card { background: white; border: 1px solid #f1f5f9; border-radius: 30px; padding: 2rem; }
        .close-trigger { position: absolute; top: 40px; right: 40px; font-size: 32px; cursor: pointer; color: #cbd5e1; z-index: 10000; }
        
        .credit-badge { background: #eff6ff; border: 1px solid #dbeafe; padding: 8px 16px; border-radius: 14px; font-size: 12px; font-weight: 800; color: #1d4ed8; cursor: pointer; }
        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; padding: 2.5rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .level-btn { transition: 0.3s; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 11px; padding: 0.8rem 1.2rem; border-radius: 12px; background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl border border-slate-100 text-center max-w-sm w-full">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl mx-auto mb-6">D</div>
            <h2 class="text-xl font-black mb-6 uppercase tracking-tight">Academic Portal</h2>
            <button id="modalGoogleBtn" class="w-full py-4 bg-slate-900 text-white rounded-xl font-black text-[10px] uppercase tracking-widest">Sign in with Google</button>
            <div class="flex items-center gap-3 mt-6 mb-8 justify-center">
                <input type="checkbox" id="termsCheck" class="w-4 h-4 rounded accent-blue-600 cursor-pointer">
                <label for="termsCheck" class="text-[10px] font-bold text-slate-500 uppercase">I accept terms</label>
            </div>
            <button id="enterPlatformBtn" disabled class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[10px] uppercase opacity-20">Enter</button>
        </div>
    </div>

    <div id="pricingPage" style="display: none;">
        <div class="close-trigger" onclick="closePricing()">✕</div>
        <div class="max-w-5xl w-full p-8 text-center">
            <h2 class="text-4xl font-black mb-4 tracking-tighter">Purchase Credits</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
                <div class="price-card">
                    <div class="text-5xl font-black mb-2">5</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$35</div>
                    <button onclick="closePricing()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
                <div class="price-card border-blue-500 shadow-2xl">
                    <div class="text-5xl font-black mb-2">25</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$98</div>
                    <button onclick="closePricing()" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase">Buy Now</button>
                </div>
                <div class="price-card">
                    <div class="text-5xl font-black mb-2">100</div>
                    <div class="text-2xl font-black text-blue-600 mb-10">HK$290</div>
                    <button onclick="closePricing()" class="w-full py-4 bg-slate-100 rounded-2xl font-black text-[10px] uppercase">Purchase</button>
                </div>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg">D</div>
                <h1 class="text-md font-black tracking-tight uppercase">DocuVision</h1>
            </div>
            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6">Recent Documents</p>
            <div id="historyList"></div>
        </aside>

        <main class="main-content">
            <nav class="flex items-center justify-between mb-16">
                <div class="flex bg-slate-100 p-1 rounded-2xl gap-2">
                    <button class="level-btn active" id="l1" onclick="setLevel('l1')">Summary</button>
                    <button class="level-btn" id="l2" onclick="setLevel('l2')">Logic</button>
                    <button class="level-btn" id="l3" onclick="setLevel('l3')">Mastery</button>
                </div>
                <div class="flex items-center gap-4">
                    <div class="credit-badge" onclick="openPricing()">CREDITS: ∞</div>
                    <div id="userProfile" class="hidden flex items-center gap-3">
                        <img id="userPhoto" class="w-10 h-10 rounded-full border-2 border-white">
                        <button id="logoutBtn" class="text-[10px] font-bold text-red-400 uppercase">Exit</button>
                    </div>
                </div>
            </nav>

            <div class="max-w-xl mx-auto mb-16">
                <div id="dropZone" class="p-8 border-2 border-dashed border-slate-200 rounded-[30px] bg-white flex items-center justify-between cursor-pointer hover:border-blue-400 transition-all">
                    <span id="fileNameDisplay" class="text-xs font-black text-slate-400 uppercase tracking-widest">Select PDF</span>
                    <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-[10px] uppercase shadow-xl disabled:opacity-20">Analyze</button>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>
            </div>

            <div id="output" class="max-w-3xl mx-auto space-y-8"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a", storageBucket: "docuvision-25f5a.firebasestorage.app", messagingSenderId: "438841299291", appId: "1:438841299291:web:d27751aff4bafdbcddca7e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let pageData = [];
        let currentLevel = "l1";
        let activeFileName = "";
        let analysisHistory = [];

        function openPricing() { document.getElementById('pricingPage').style.display = 'flex'; }
        function closePricing() { document.getElementById('pricingPage').style.display = 'none'; }

        // Auth
        document.getElementById('termsCheck').onchange = (e) => {
            const btn = document.getElementById('enterPlatformBtn');
            btn.disabled = !e.target.checked;
            btn.style.opacity = e.target.checked ? "1" : "0.2";
        };
        document.getElementById('modalGoogleBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('enterPlatformBtn').onclick = () => { if(auth.currentUser) document.getElementById('authOverlay').style.display = 'none'; };
        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });

        // Level Logic - FIXED: Now re-renders content with different data
        function setLevel(lvl) {
            currentLevel = lvl;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lvl).classList.add('active');
            if(activeFileName) renderContent();
        }

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = (e) => { if(e.target.id !== 'analyzeBtn') fInput.click(); };
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            activeFileName = file.name;
            document.getElementById('fileNameDisplay').innerText = file.name;
            document.getElementById('analyzeBtn').disabled = false;
        };

        document.getElementById('analyzeBtn').onclick = () => {
            if (!analysisHistory.find(h => h.name === activeFileName)) {
                analysisHistory.push({ name: activeFileName });
                updateHistoryUI();
            }
            renderContent();
        };

        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            analysisHistory.forEach(item => {
                const div = document.createElement('div');
                div.className = "history-item";
                div.innerHTML = `<span>📄</span> ${item.name}`;
                div.onclick = () => {
                    activeFileName = item.name;
                    document.getElementById('fileNameDisplay').innerText = item.name;
                    renderContent();
                };
                list.appendChild(div);
            });
        }

        // FIXED: AI Output now varies based on currentLevel
        function getContent(level, section) {
            const data = {
                'l1': [
                    "Overview of the social hierarchy in 1815 Maryland.",
                    "Summary of the economic impact of the Cotton Gin.",
                    "Brief look at the risks of losing freedom papers.",
                    "Summary of Dana's transition between time periods."
                ],
                'l2': [
                    "Analysis: Why laws were designed to treat humans as property to maintain the hierarchy.",
                    "Connection: How profitability from industrial inventions directly increased the demand for labor.",
                    "Risk Assessment: Why freedom papers acted as a fragile legal shield against kidnapping.",
                    "Contrast: How Dana's 1976 education serves as a crime in 1815 Maryland."
                ],
                'l3': [
                    "Deep Mastery: Evaluating primary sources like Frederick Douglass for historical accuracy.",
                    "Economic Theory: The correlation between King Cotton and political power in the Antebellum South.",
                    "Legal Review: Analyzing the Fugitive Slave Act's role in the erosion of Black civil rights.",
                    "Character Mastery: Evaluating the irony of the 1976 U.S. Bicentennial through Dana's perspective."
                ]
            };
            return data[level][section] || "Document data analyzed.";
        }

        function renderContent() {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const isKindred = activeFileName.toLowerCase().includes("kindred");

            for(let i = 0; i < 4; i++) {
                const card = document.createElement('div');
                card.className = "study-card";
                const text = isKindred ? getContent(currentLevel, i) : "Analysis complete for uploaded document.";
                const titles = { 'l1': 'Quick Summary', 'l2': 'Contextual Logic', 'l3': 'Deep Mastery' };
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                        <span class="text-[10px] font-black text-slate-300 uppercase">Section 0${i+1}</span>
                    </div>
                    <h3 class="text-blue-600 font-black text-[10px] mb-4 uppercase tracking-widest">${titles[currentLevel]}</h3>
                    <p class="text-lg font-bold text-slate-800 leading-relaxed">${text}</p>`;
                out.appendChild(card);
            }
        }
    </script>
</body>
</html>
