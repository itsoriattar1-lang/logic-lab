<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision AI | Neural Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .study-card { border-radius: 28px; border: 1px solid #e2e8f0; background: white; transition: all 0.4s ease; position: relative; overflow: hidden; }
        .study-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: #3b82f6; opacity: 0.1; }
        .level-btn.active { background: #1e293b; color: white; border-color: #1e293b; box-shadow: 0 4px 12px rgba(30, 41, 59, 0.2); }
        .quiz-option { border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s; border-radius: 16px; padding: 1rem; font-size: 0.8rem; }
        .quiz-option:hover:not(.locked) { border-color: #3b82f6; background: #f0f7ff; }
        .quiz-option.selected-wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
        .quiz-option.show-correct { border-color: #10b981; background: #f0fdf4; color: #166534; font-weight: 700; border-style: solid; }
        .explanation-box { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen text-slate-900 font-sans pb-24">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-12 border-b border-slate-100 pb-8">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-900 rounded-2xl flex items-center justify-center text-white font-black italic shadow-xl">DV</div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter uppercase">DocuVision <span class="text-blue-600">Cognitive</span></h1>
                    <p class="text-[9px] text-slate-400 font-black uppercase tracking-[0.3em]">Semantic Analysis v5.2</p>
                </div>
            </div>
            <div id="masteryContainer" class="hidden flex items-center gap-6 bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm">
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Knowledge Retention</p>
                    <div class="w-32 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                        <div id="masteryBar" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
                <p id="masteryPercent" class="text-xl font-black text-slate-900">0%</p>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            <div class="lg:col-span-1 space-y-4">
                <div id="dropZone" class="rounded-3xl p-8 text-center bg-white border-2 border-dashed border-slate-200 cursor-pointer hover:border-blue-500 hover:bg-blue-50/30 transition-all">
                    <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Identify Source</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-6">
                    <div>
                        <h3 class="text-[9px] font-black text-slate-400 mb-4 uppercase tracking-widest">Cognitive Depth</h3>
                        <div class="space-y-2">
                            <button data-level="1" class="level-btn active w-full text-left px-4 py-3 rounded-xl border text-[11px] font-bold transition-all">EXECUTIVE SUMMARY</button>
                            <button data-level="2" class="level-btn w-full text-left px-4 py-3 rounded-xl border text-[11px] font-bold transition-all text-slate-600">LOGIC ARCHITECTURE</button>
                            <button data-level="3" class="level-btn w-full text-left px-4 py-3 rounded-xl border text-[11px] font-bold border-blue-100 text-blue-600">ACADEMIC MASTERY</button>
                        </div>
                    </div>
                    <button id="analyzeBtn" disabled class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-slate-900 transition-all disabled:opacity-20 uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-blue-100">Begin Scan</button>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-10" id="output">
                <div class="py-40 text-center">
                    <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-6 h-6 text-slate-200" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"></path></svg>
                    </div>
                    <p class="text-slate-400 font-medium tracking-tight">System ready for intelligence extraction...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const levelButtons = document.querySelectorAll('.level-btn');
        const masteryContainer = document.getElementById('masteryContainer');
        const masteryPercent = document.getElementById('masteryPercent');
        const masteryBar = document.getElementById('masteryBar');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageData = [];
        let currentLevel = "1";
        let scoreTracker = {};

        levelButtons.forEach(btn => {
            btn.onclick = () => {
                levelButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.getAttribute('data-level');
            };
        });

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                analyzeBtn.disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        // COMMON SENSE ENGINE: Detects the type of content on a page
        function classifyContent(text) {
            const lowerText = text.toLowerCase();
            if (lowerText.includes('table of contents') || lowerText.includes('index')) return 'STRUCTURE';
            if (lowerText.includes('summary') || lowerText.includes('conclusion')) return 'KEY_OUTCOME';
            if (text.match(/\d+\%/ ) || lowerText.includes('data') || lowerText.includes('figure')) return 'DATA_HEAVY';
            return 'GENERAL';
        }

        window.handleQuiz = (el, isCorrect, id, expl) => {
            const parent = el.parentElement;
            if (parent.classList.contains('locked')) return;
            parent.classList.add('locked');

            const allOptions = parent.querySelectorAll('.quiz-option');
            allOptions.forEach(opt => {
                if (opt.getAttribute('data-correct') === 'true') opt.classList.add('show-correct');
            });

            if (!isCorrect) el.classList.add('selected-wrong');
            else scoreTracker[id] = true;

            const expBox = document.getElementById(`exp-${id}`);
            expBox.innerHTML = `<strong>ANALYSIS:</strong> ${expl}`;
            expBox.style.display = 'block';

            const score = Math.round((Object.keys(scoreTracker).length / pageData.length) * 100);
            masteryPercent.innerText = score + "%";
            masteryBar.style.width = score + "%";
            masteryContainer.classList.remove('hidden');
        };

        analyzeBtn.onclick = () => {
            output.innerHTML = "";
            pageData.forEach((page, index) => {
                const contentType = classifyContent(page.text);
                const words = page.text.trim().split(/\s+/);
                const header = words.slice(0, 4).join(" ") || "Section Analysis";
                
                const card = document.createElement('div');
                card.className = "study-card p-10 shadow-sm mb-12";
                
                let brainLogic = {
                    focus: "Foundational Overview",
                    tip: "Focus on how these terms define the scope of the document.",
                    q: `What is the primary role of "${header}" in the document's hierarchy?`,
                    a1: "It serves as a critical definition for the following data.",
                    a2: "It is supplementary text for formatting purposes.",
                    expl: "Correct. High-level analysis shows this section establishes the parameters for the rest of the file."
                };

                if (contentType === 'DATA_HEAVY') {
                    brainLogic = {
                        focus: "Quantitative Analysis",
                        tip: "This page contains specific data points. Memorize the relationship between these numbers.",
                        q: "Why is the data presented in this section vital for the exam?",
                        a1: "It provides empirical evidence to support the main claims.",
                        a2: "It is provided to fill space in the document structure.",
                        expl: "Correct. Data-heavy sections are almost always the basis for 'Evidence' style questions on exams."
                    };
                } else if (contentType === 'STRUCTURE') {
                    brainLogic = {
                        focus: "Structural Blueprint",
                        tip: "This is a navigational page. Use it to understand the flow of the argument.",
                        q: "What does this structural overview tell us about the document's logic?",
                        a1: "It reveals a step-by-step progression from concept to application.",
                        a2: "It shows that the document is a random collection of thoughts.",
                        expl: "Correct. Professional documents follow a linear logic path which this index makes clear."
                    };
                }

                let depthHTML = "";
                if (currentLevel === "3") {
                    depthHTML = `
                        <div class="mt-10 pt-10 border-t border-slate-50">
                            <div class="flex items-center gap-2 mb-6">
                                <span class="w-1.5 h-1.5 rounded-full bg-blue-600"></span>
                                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Cognitive Focus: ${brainLogic.focus}</h4>
                            </div>
                            <p class="text-[11px] text-slate-500 font-medium mb-8 leading-relaxed">${brainLogic.tip}</p>
                            <div class="bg-slate-50 p-8 rounded-[2rem] border border-slate-100">
                                <p class="text-sm font-bold text-slate-800 mb-6">${brainLogic.q}</p>
                                <div class="space-y-3">
                                    <div class="quiz-option" data-correct="true" onclick="handleQuiz(this, true, ${index}, '${brainLogic.expl.replace(/'/g, "\\'")}')">A) ${brainLogic.a1}</div>
                                    <div class="quiz-option" data-correct="false" onclick="handleQuiz(this, false, ${index}, '${brainLogic.expl.replace(/'/g, "\\'")}')">B) ${brainLogic.a2}</div>
                                </div>
                                <div id="exp-${index}" class="explanation-box mt-6 p-5 bg-white border border-blue-100 rounded-2xl text-[10px] text-blue-700 leading-relaxed font-bold hidden shadow-sm"></div>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase tracking-tighter">Segment 0${page.num}</span>
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${contentType} Detected</span>
                    </div>
                    <h3 class="text-xl font-black text-slate-900 mb-6 tracking-tight">${header}...</h3>
                    <p class="text-slate-400 text-xs leading-relaxed mb-6 font-medium">${page.text.substring(0, 300)}...</p>
                    ${depthHTML}
                `;
                output.appendChild(card);
            });
        };
    </script>
</body>
</html>
