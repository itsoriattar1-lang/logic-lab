<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Private Cloud Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        .study-card { border-radius: 32px; border: 1px solid #f1f5f9; background: white; transition: 0.3s; }
        .level-btn { transition: 0.2s; border: 1px solid #e2e8f0; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .history-item { cursor: pointer; transition: 0.2s; border-radius: 12px; }
        .history-item:hover { background: #f8fafc; border-left: 4px solid #3b82f6; }
        .quiz-opt { cursor: pointer; transition: 0.2s; border: 2px solid #f8fafc; border-radius: 16px; padding: 1rem; font-size: 0.8rem; }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen font-sans text-slate-900 flex flex-col">

    <header class="h-20 bg-white border-b flex justify-between items-center px-10 sticky top-0 z-50">
        <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">DV</div>
            <h1 class="text-xs font-black uppercase tracking-tighter">DocuVision <span class="text-blue-600">Cloud</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <button id="loginBtn" class="bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 transition-all">Sign In</button>
            <div id="userProfile" class="hidden flex items-center gap-3">
                <img id="userPhoto" class="w-9 h-9 rounded-full border-2 border-white shadow-sm">
                <button id="logoutBtn" class="text-[9px] font-black text-slate-400 uppercase">Logout</button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 bg-white border-r flex flex-col p-6 hidden lg:flex">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Personal Library</h3>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-2">
                <p class="text-[10px] text-slate-300 italic">Sign in to view history...</p>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-10">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[40px] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all">
                        <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase text-center">Upload PDF</p>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf">
                    </div>
                    
                    <div class="md:col-span-2 bg-white p-8 rounded-[40px] border border-slate-100 flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Mode</h3>
                                <div class="flex gap-3">
                                    <button class="level-btn active px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase">Simple</button>
                                    <button class="level-btn px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase">Logic</button>
                                    <button class="level-btn px-6 py-2.5 rounded-2xl text-[10px] font-black uppercase">Mastery</button>
                                </div>
                            </div>
                            <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-10 py-4 rounded-[20px] font-black text-xs uppercase shadow-xl shadow-blue-100 hover:scale-105 disabled:opacity-20 transition-all">Run Engine</button>
                        </div>
                    </div>
                </div>

                <div id="output" class="space-y-8"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA",
            authDomain: "docuvision-25f5a.firebaseapp.com",
            projectId: "docuvision-25f5a",
            storageBucket: "docuvision-25f5a.firebasestorage.app",
            messagingSenderId: "438841299291",
            appId: "1:438841299291:web:d27751aff4bafdbcddca7e",
            measurementId: "G-71CCCZ01L3"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // AUTH & HISTORY FETCH
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
                loadHistory(user.uid);
            } else {
                document.getElementById('loginBtn').classList.remove('hidden');
                document.getElementById('userProfile').classList.add('hidden');
                document.getElementById('historyList').innerHTML = '<p class="text-[10px] text-slate-300 italic">Sign in to view history...</p>';
            }
        });

        document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => auth.signOut();

        // ENGINE LOGIC
        let currentLevel = "simple";
        let pageData = [];
        const btns = document.querySelectorAll('.level-btn');
        btns.forEach(btn => {
            btn.onclick = () => {
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.innerText.toLowerCase();
            };
        });

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = () => fInput.click();
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('analyzeBtn').onclick = async () => {
            const out = document.getElementById('output');
            out.innerHTML = "<div class='text-center animate-pulse py-10 font-black text-blue-600 uppercase text-xs'>Analyzing Data...</div>";
            
            setTimeout(async () => {
                renderContent(pageData);
                const user = auth.currentUser;
                if (user) {
                    await db.collection('users').doc(user.uid).collection('history').add({
                        fileName: document.getElementById('fileNameDisplay').innerText,
                        data: pageData,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    loadHistory(user.uid);
                }
            }, 800);
        };

        function renderContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            data.forEach((page, index) => {
                const sentences = page.text.split('. ').filter(s => s.length > 35);
                const mainFact = sentences[0] || "No text detected.";
                const title = mainFact.split(' ').slice(0, 4).join(" ");
                const card = document.createElement('div');
                card.className = "study-card p-10 shadow-sm mb-8";
                
                let inner = "";
                if (currentLevel === "simple") inner = `<p class="text-slate-500 text-sm border-l-2 border-blue-500 pl-6 italic">${mainFact}</p>`;
                else if (currentLevel === "logic") inner = `<div class="bg-blue-50 p-6 rounded-3xl border border-blue-100"><h4 class="text-[9px] font-black text-blue-600 uppercase mb-2">Thesis</h4><p class="text-xs font-bold text-slate-800">${mainFact}</p></div>`;
                else {
                    const dist = sentences[1] || "Contextual observation.";
                    const ch = [{t: mainFact, c: true}, {t: dist, c: false}].sort(() => Math.random() - 0.5);
                    inner = `<div class="space-y-3">${ch.map(o => `<div class="quiz-opt" onclick="check(this, ${o.c}, ${index})">${o.t}</div>`).join('')}<div id="check-${index}" class="hidden mt-6 p-4 bg-slate-900 text-white rounded-2xl text-[10px] font-mono">SOURCE: ${mainFact}</div></div>`;
                }
                card.innerHTML = `<div class="flex items-center gap-3 mb-6"><span class="text-[9px] font-black bg-slate-900 text-white px-3 py-1 rounded-full uppercase">PAGE ${page.num}</span><h3 class="text-sm font-black text-slate-900 uppercase">${title}...</h3></div>${inner}`;
                out.appendChild(card);
            });
        }

        async function loadHistory(uid) {
            const snap = await db.collection('users').doc(uid).collection('history').orderBy('timestamp', 'desc').limit(10).get();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const item = document.createElement('div');
                item.className = "history-item p-4 border border-slate-50 text-[10px] font-bold text-slate-500 uppercase truncate";
                item.innerText = doc.data().fileName;
                item.onclick = () => {
                    pageData = doc.data().data;
                    renderContent(pageData);
                };
                list.appendChild(item);
            });
        }

        window.check = (el, isC, id) => {
            el.style.borderColor = isC ? '#10b981' : '#ef4444';
            el.style.backgroundColor = isC ? '#f0fdf4' : '#fef2f2';
            document.getElementById(`check-${id}`).classList.remove('hidden');
        };
    </script>
</body>
</html>
