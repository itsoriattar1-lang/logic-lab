<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Professional AI Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; overflow-x: hidden; }
        .study-card { border-radius: 40px; background: white; border: 1px solid #f1f5f9; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .study-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05); }
        .level-btn { transition: 0.3s; border: 1px solid #e2e8f0; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 10px; padding: 1.2rem 2.2rem; border-radius: 1.2rem; background: white; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 12px 24px -6px rgba(37, 99, 235, 0.3); }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="h-24 bg-white border-b flex justify-between items-center px-10 sticky top-0 z-50">
        <div class="flex items-center gap-5 cursor-pointer" onclick="location.reload()">
            <div class="w-14 h-14 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-black text-2xl shadow-xl">D</div>
            <div>
                <h1 class="text-sm font-black uppercase tracking-tighter italic leading-none">DocuVision <span class="text-blue-600 text-[10px] ml-1">v3.0</span></h1>
                <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-[0.3em] mt-1">IT Class Presentation Mode</p>
            </div>
        </div>
    </header>

    <main class="flex-1 p-10">
        <div class="max-w-6xl mx-auto">
            
            <div class="grid grid-cols-1 xl:grid-cols-4 gap-8 mb-12">
                <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[40px] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all">
                    <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Injest Source</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>
                
                <div class="xl:col-span-3 bg-white p-8 rounded-[40px] border border-slate-100 flex flex-col lg:flex-row items-center justify-between shadow-sm">
                    <div class="flex flex-wrap gap-4 mb-6 lg:mb-0">
                        <button class="level-btn active" id="l1">Level 1: Summary</button>
                        <button class="level-btn" id="l2">Level 2: Logic</button>
                        <button class="level-btn" id="l3">Level 3: Mastery</button>
                    </div>
                    <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-14 py-5 rounded-3xl font-black text-sm uppercase tracking-widest shadow-2xl shadow-blue-200 disabled:opacity-20 hover:scale-105 active:scale-95 transition-all">Execute AI Analysis</button>
                </div>
            </div>

            <div id="output" class="space-y-10 pb-32"></div>
        </div>
    </main>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a", storageBucket: "docuvision-25f5a.firebasestorage.app", messagingSenderId: "438841299291", appId: "1:438841299291:web:d27751aff4bafdbcddca7e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let pageData = [];
        let currentLevel = "l1";

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.id;
                if(pageData.length) renderContent(pageData);
            };
        });

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = () => fInput.click();
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        // --- ENHANCED AI ENGINE ---
        async function smartSummarize(text) {
            const cleanText = text.replace(/\s+/g, ' ').substring(0, 1200);
            const token = "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";
            
            try {
                // Timeout logic for presenting in schools with bad Wi-Fi
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 6000);

                const response = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
                    headers: { Authorization: `Bearer ${token}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: cleanText }),
                    signal: controller.signal
                });
                
                const result = await response.json();
                clearTimeout(timeoutId);

                if (result[0]?.summary_text && result[0].summary_text.length > 30) {
                    return result[0].summary_text;
                }
                throw new Error("Short response");

            } catch (err) {
                // LOCAL FALLBACK: Handles the "because" logic if API fails or is slow
                const sentences = cleanText.match(/[^.!?]+[.!?:]+/g) || [cleanText];
                for (let i = 0; i < sentences.length; i++) {
                    if (sentences[i].toLowerCase().includes("because") || sentences[i].includes(":")) {
                        return sentences[i] + " " + (sentences[i+1] || "") + " " + (sentences[i+2] || "");
                    }
                }
                return sentences[0] + " " + (sentences[1] || "");
            }
        }

        document.getElementById('analyzeBtn').onclick = () => renderContent(pageData);

        async function renderContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const workingSet = data.slice(1); // Still skips page 1
            
            for(const page of workingSet) {
                const card = document.createElement('div');
                card.className = "study-card p-12 mb-8";
                card.innerHTML = `<div class="h-20 w-full skeleton rounded-3xl"></div>`;
                out.appendChild(card);

                const aiResponse = await smartSummarize(page.text);
                
                let html = "";
                const ytRegex = /(https?:\/\/[^\s]+youtube[^\s]+|https?:\/\/youtu\.be[^\s]+)/g;
                const links = page.text.match(ytRegex);

                if (links) {
                    html = `<div class="bg-red-50 p-8 rounded-3xl border border-red-100 flex items-center gap-6">
                                <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white">▶</div>
                                <a href="${links[0]}" target="_blank" class="text-sm font-black text-slate-900 underline block truncate">${links[0]}</a>
                            </div>`;
                } else if (currentLevel === "l1") {
                    html = `<h4 class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-6">Level 1: AI Summary</h4>
                            <p class="text-lg font-bold leading-relaxed text-slate-800 border-l-8 border-blue-600 pl-10">${aiResponse}</p>`;
                } else if (currentLevel === "l2") {
                    html = `<div class="bg-slate-900 p-10 rounded-[40px] text-white">
                                <h4 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-6">Level 2: Logic Bridge</h4>
                                <p class="text-md font-bold leading-relaxed text-blue-50">"${aiResponse}"</p>
                            </div>`;
                } else {
                    html = `<div class="p-10 bg-slate-50 rounded-[40px] border border-dashed border-slate-200 text-center">
                                <h4 class="text-[10px] font-black text-slate-400 uppercase mb-4">Level 3: Master Challenge</h4>
                                <p class="text-slate-800 font-bold italic">"Synthesize the implications of: ${aiResponse.substring(0, 50)}..."</p>
                            </div>`;
                }

                card.innerHTML = `<div class="mb-8 flex justify-between items-center">
                    <span class="bg-blue-600 text-white px-5 py-2 rounded-full text-[9px] font-black uppercase">PAGE ${page.num}</span>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">AI Engine Active</span>
                </div>${html}`;
            }
        }
    </script>
</body>
</html>
