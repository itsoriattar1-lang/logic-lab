<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Full Logic Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; width: 100vw; background: #fcfdfe; color: #0f172a; }
        .study-card { border-radius: 40px; background: white; border: 1px solid #f1f5f9; transition: all 0.4s ease; }
        .level-btn { transition: 0.3s; border: 1px solid #e2e8f0; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3); }
        .history-item { cursor: pointer; transition: 0.2s; border-radius: 18px; margin-bottom: 10px; border: 1px solid #f1f5f9; padding: 1.2rem; background: white; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .history-item:hover { background: #f8fafc; border-color: #3b82f6; transform: translateX(8px); }
        .ai-pulse { position: relative; }
        .ai-pulse::after { content: ''; position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: inherit; box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="h-24 bg-white border-b flex justify-between items-center px-10 sticky top-0 z-50">
        <div class="flex items-center gap-5 cursor-pointer" onclick="location.reload()">
            <div class="w-14 h-14 bg-blue-600 rounded-3xl flex items-center justify-center text-white font-black text-2xl shadow-2xl shadow-blue-200">D</div>
            <div>
                <h1 class="text-sm font-black uppercase tracking-tighter italic leading-none">DocuVision <span class="text-blue-600">Pro</span></h1>
                <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-[0.3em] mt-1">Full-Context Analysis</p>
            </div>
        </div>
        <div id="userProfile" class="hidden flex items-center gap-5">
            <img id="userPhoto" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
            <button id="logoutBtn" class="text-[9px] font-bold text-red-400 uppercase hover:text-red-600">Logout</button>
        </div>
        <button id="loginBtn" class="bg-slate-900 text-white px-10 py-4 rounded-full text-[11px] font-black uppercase tracking-widest hover:bg-blue-600 shadow-xl shadow-slate-200">Sign In</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 flex-shrink-0 bg-white border-r flex flex-col p-10 hidden lg:flex">
            <h3 class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] mb-10">Archive</h3>
            <div id="historyList" class="flex-1 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 overflow-y-auto p-12 bg-[#f8fafc]">
            <div class="max-w-6xl mx-auto">
                
                <div id="aiConsole" class="hidden mb-12 p-8 bg-slate-900 rounded-[40px] text-white shadow-2xl relative overflow-hidden">
                    <div class="flex items-center justify-between relative z-10">
                        <div class="flex items-center gap-6">
                            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center ai-pulse"><span class="text-xs">AI</span></div>
                            <div>
                                <h4 id="statusTitle" class="text-[11px] font-black text-blue-400 uppercase tracking-[0.2em]">Context Loaded</h4>
                                <p id="statusMsg" class="text-slate-400 text-xs mt-1">Synchronizing logic patterns...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 xl:grid-cols-4 gap-8 mb-16">
                    <div id="dropZone" class="p-10 border-2 border-dashed border-slate-200 rounded-[45px] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all shadow-sm">
                        <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase text-center">Select PDF</p>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf">
                    </div>
                    
                    <div class="xl:col-span-3 bg-white p-10 rounded-[45px] border border-slate-100 flex flex-col lg:flex-row items-center justify-between shadow-xl">
                        <div class="flex flex-wrap gap-4 mb-6 lg:mb-0">
                            <button class="level-btn active px-8 py-5 rounded-2xl" id="l1">Level 1: Summary</button>
                            <button class="level-btn px-8 py-5 rounded-2xl" id="l2">Level 2: Logic</button>
                            <button class="level-btn px-8 py-5 rounded-2xl" id="l3">Level 3: Mastery</button>
                        </div>
                        <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-16 py-6 rounded-3xl font-black text-sm uppercase tracking-widest shadow-2xl shadow-blue-300 disabled:opacity-20 transition-all">Analyze</button>
                    </div>
                </div>

                <div id="output" class="space-y-12 pb-32"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA", authDomain: "docuvision-25f5a.firebaseapp.com", projectId: "docuvision-25f5a", storageBucket: "docuvision-25f5a.firebasestorage.app", messagingSenderId: "438841299291", appId: "1:438841299291:web:d27751aff4bafdbcddca7e" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentLevel = "l1";
        let pageData = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
                loadHistory(user.uid);
            }
        });

        document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => location.reload());

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.id;
                if(pageData.length > 0) renderContent(pageData);
            };
        });

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = () => fInput.click();
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('aiConsole').classList.remove('hidden');
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('analyzeBtn').onclick = () => { renderContent(pageData); saveToCloud(); };

        function renderContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const workingSet = data.slice(1);
            
            workingSet.forEach((page) => {
                // SPLIT by sentence but keep colons and numbers intact
                const rawSentences = page.text.match(/[^.!?]+[.!?:]+/g) || [page.text];
                const cleanSentences = rawSentences.map(s => s.trim());

                const ytRegex = /(https?:\/\/[^\s]+youtube[^\s]+|https?:\/\/youtu\.be[^\s]+)/g;
                const links = page.text.match(ytRegex);

                const card = document.createElement('div');
                card.className = "study-card p-14 mb-10";
                
                let html = "";

                if (links) {
                    html = `<div class="bg-red-50 p-8 rounded-3xl border border-red-100 flex items-center gap-6">
                        <div class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white">▶</div>
                        <a href="${links[0]}" target="_blank" class="text-sm font-bold text-slate-800 underline">${links[0]}</a>
                    </div>`;
                } else if (currentLevel === "l1") {
                    // COMMON SENSE ENGINE: If sentence ends with a reason-starter, grab more.
                    let summaryText = cleanSentences[0];
                    if (summaryText.toLowerCase().includes("because") || summaryText.endsWith(":")) {
                        summaryText += " " + (cleanSentences[1] || "") + " " + (cleanSentences[2] || "");
                    }

                    html = `<h4 class="text-[11px] font-black text-blue-600 uppercase tracking-widest mb-6">Level 1: Summary</h4>
                            <p class="text-xl font-bold leading-relaxed text-slate-800 border-l-8 border-blue-600 pl-10">
                                ${summaryText}
                            </p>`;
                } else if (currentLevel === "l2") {
                    // FIND LOGIC: Search for "because" or "therefore"
                    let logic = cleanSentences.find(s => s.toLowerCase().includes("because") || s.toLowerCase().includes("since")) || cleanSentences[0];
                    let index = cleanSentences.indexOf(logic);
                    if (logic.endsWith(":") || logic.toLowerCase().endsWith("because")) {
                        logic += " " + (cleanSentences[index+1] || "") + " " + (cleanSentences[index+2] || "");
                    }

                    html = `<div class="bg-slate-900 p-12 rounded-[45px] text-white">
                                <h4 class="text-[11px] font-black text-blue-400 uppercase tracking-widest mb-8">Level 2: Logic Flow</h4>
                                <p class="text-lg font-bold leading-relaxed text-blue-50">"${logic}"</p>
                            </div>`;
                } else {
                    html = `<div class="text-center">
                                <h4 class="text-[11px] font-black text-slate-300 uppercase tracking-widest mb-8">Level 3: Mastery</h4>
                                <p class="text-slate-800 text-lg font-bold italic">"Explain the connection between the evidence on this page and the main chapter thesis."</p>
                            </div>`;
                }

                card.innerHTML = `<div class="mb-8"><span class="bg-blue-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase">PAGE ${page.num}</span></div>${html}`;
                out.appendChild(card);
            });
        }

        async function saveToCloud() {
            const user = auth.currentUser;
            if (user) {
                await db.collection('users').doc(user.uid).collection('history').add({
                    fileName: document.getElementById('fileNameDisplay').innerText,
                    data: pageData, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                loadHistory(user.uid);
            }
        }

        async function loadHistory(uid) {
            const snap = await db.collection('users').doc(uid).collection('history').orderBy('timestamp', 'desc').limit(10).get();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const item = document.createElement('div');
                item.className = "history-item";
                item.innerText = doc.data().fileName;
                item.onclick = () => { pageData = doc.data().data; renderContent(pageData); };
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
