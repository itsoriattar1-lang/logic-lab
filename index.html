<script>
// 1. Firebase Configuration
const firebaseConfig = {
    apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA",
    authDomain: "docuvision-25f5a.firebaseapp.com",
    projectId: "docuvision-25f5a",
    storageBucket: "docuvision-25f5a.firebasestorage.app",
    messagingSenderId: "438841299291",
    appId: "1:438841299291:web:d27751aff4bafdbcddca7e",
    measurementId: "G-71CCCZ01L3"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 2. Optimized Analysis Engine
document.getElementById('analyzeBtn').onclick = async () => {
    const output = document.getElementById('output');
    output.innerHTML = '<div class="p-10 text-center text-xs font-black text-blue-600 animate-pulse tracking-widest">EXTRACTING DATA STRINGS...</div>';
    
    // Get current mode from the active button
    const activeBtn = document.querySelector('.level-btn.active');
    const mode = activeBtn ? activeBtn.innerText.toLowerCase() : "simple";

    setTimeout(() => {
        output.innerHTML = "";
        
        pageData.forEach((page, index) => {
            // DATA REFINEMENT: Filter for meaningful sentences
            const sentences = page.text.match(/[^.!?]+[.!?]+/g) || [];
            const cleanData = sentences.filter(s => s.trim().length > 40);
            
            if (cleanData.length === 0) return;

            const mainFact = cleanData[0].trim();
            const deepDetail = cleanData[1] || cleanData[0];
            const title = mainFact.split(' ').slice(0, 5).join(" ");

            const card = document.createElement('div');
            card.className = "study-card p-8 mb-8 bg-white border border-slate-100 shadow-sm hover:shadow-md transition-shadow";
            
            let resultHtml = "";

            if (mode === "l1") {
                resultHtml = `
                    <div class="flex items-start gap-4">
                        <div class="w-1 h-12 bg-blue-500 rounded-full"></div>
                        <p class="text-slate-600 text-sm leading-relaxed">${mainFact}</p>
                    </div>`;
            } 
            else if (mode === "l2") {
                resultHtml = `
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200">
                        <h4 class="text-[10px] font-black text-blue-600 uppercase mb-3 tracking-widest">Contextual Relationship</h4>
                        <p class="text-xs text-slate-900 font-bold mb-2">Primary Thesis: ${title}...</p>
                        <p class="text-xs text-slate-600 leading-relaxed">${deepDetail}</p>
                    </div>`;
            } 
            else {
                // MASTERY QUIZ
                const options = [
                    { text: mainFact, correct: true },
                    { text: "This page primarily discusses abstract themes unrelated to " + title, correct: false }
                ].sort(() => Math.random() - 0.5);

                resultHtml = `
                    <div class="space-y-4">
                        <p class="text-xs font-bold text-slate-800">Mastery Check: Which data point is explicitly stated on Page ${page.num}?</p>
                        ${options.map(opt => `
                            <button class="w-full text-left p-4 border-2 border-slate-100 rounded-xl text-xs hover:bg-blue-50 transition-colors"
                                    onclick="verifyQuiz(this, ${opt.correct}, ${index})">
                                ${opt.text}
                            </button>
                        `).join('')}
                        <div id="feedback-${index}" class="hidden p-4 bg-blue-600 text-white rounded-xl text-[10px] font-bold">
                            SOURCE TEXT: "${mainFact}"
                        </div>
                    </div>`;
            }

            card.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-2">
                        <span class="bg-slate-900 text-white text-[9px] font-black px-2 py-1 rounded">PAGE ${page.num}</span>
                        <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">${title}</h3>
                    </div>
                </div>
                ${resultHtml}
            `;
            output.appendChild(card);
        });

        saveToCloud(document.getElementById('fileNameDisplay').innerText);
    }, 800);
};

// 3. Global Helpers
window.verifyQuiz = (btn, isCorrect, id) => {
    const feedback = document.getElementById(`feedback-${id}`);
    btn.style.borderColor = isCorrect ? '#10b981' : '#ef4444';
    btn.style.backgroundColor = isCorrect ? '#f0fdf4' : '#fef2f2';
    feedback.classList.remove('hidden');
};

async function saveToCloud(fileName) {
    const user = auth.currentUser;
    if (!user) return;
    await db.collection('users').doc(user.uid).collection('history').add({
        fileName,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
}
</script>
