<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Fixed Layout Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* FIX: Prevents horizontal scroll on the whole page */
        body { overflow-x: hidden; width: 100vw; }
        
        .study-card { border-radius: 40px; background: white; border: 1px solid #f1f5f9; transition: 0.4s; }
        .level-btn { transition: 0.3s; border: 1px solid #e2e8f0; cursor: pointer; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .quiz-opt { cursor: pointer; transition: 0.2s; border: 2px solid #f8fafc; border-radius: 24px; padding: 1.5rem; font-size: 0.9rem; display: flex; align-items: start; gap: 15px; margin-bottom: 1rem; }
        
        /* Sidebar Styling */
        .history-item { cursor: pointer; transition: 0.2s; border-radius: 12px; margin-bottom: 8px; border: 1px solid #f1f5f9; padding: 0.75rem; background: white; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .history-item:hover { background: #f8fafc; border-color: #3b82f6; transform: translateX(5px); }
        
        /* Custom Scrollbar for Sidebar */
        #historyList::-webkit-scrollbar { width: 4px; }
        #historyList::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfdfe] min-h-screen font-sans text-slate-900 flex flex-col">

    <header class="h-20 bg-white border-b flex justify-between items-center px-8 sticky top-0 z-50">
        <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">DV</div>
            <h1 class="text-xs font-black uppercase tracking-tighter italic">DocuVision <span class="text-blue-600">Narrative</span></h1>
        </div>
        <div id="userProfile" class="hidden flex items-center gap-3">
            <button id="logoutBtn" class="text-[9px] font-black text-slate-400 uppercase mr-2">Logout</button>
            <img id="userPhoto" class="w-9 h-9 rounded-full border-2 border-white shadow-sm">
        </div>
        <button id="loginBtn" class="bg-slate-900 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-600">Sign In</button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 flex-shrink-0 bg-white border-r flex flex-col p-6 hidden md:flex">
            <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-6">Archive</h3>
            <div id="historyList" class="flex-1 overflow-y-auto pr-2"></div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 lg:p-12 bg-[#f8fafc]/30">
            <div class="max-w-4xl mx-auto">
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-6 mb-12">
                    <div id="dropZone" class="p-8 border-2 border-dashed border-slate-200 rounded-[35px] bg-white flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 transition-all">
                        <p id="fileNameDisplay" class="text-[10px] font-black text-slate-400 uppercase text-center">Drop PDF</p>
                        <input type="file" id="fileInput" class="hidden" accept=".pdf">
                    </div>
                    
                    <div class="xl:col-span-2 bg-white p-8 rounded-[35px] border border-slate-100 flex flex-wrap gap-6 items-center justify-between shadow-sm">
                        <div class="flex gap-2">
                            <button class="level-btn active px-5 py-3 rounded-xl text-[10px] font-black uppercase" id="l1">L1</button>
                            <button class="level-btn px-5 py-3 rounded-xl text-[10px] font-black uppercase" id="l2">L2</button>
                            <button class="level-btn px-5 py-3 rounded-xl text-[10px] font-black uppercase" id="l3">L3</button>
                        </div>
                        <button id="analyzeBtn" disabled class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black text-[11px] uppercase shadow-xl shadow-blue-200 disabled:opacity-20">Analyze</button>
                    </div>
                </div>

                <div id="output" class="space-y-10"></div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9QkqiRl50Vp8UdYqVsJHVekSHi1PNweA",
            authDomain: "docuvision-25f5a.firebaseapp.com",
            projectId: "docuvision-25f5a",
            storageBucket: "docuvision-25f5a.firebasestorage.app",
            messagingSenderId: "438841299291",
            appId: "1:438841299291:web:d27751aff4bafdbcddca7e"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentLevel = "l1";
        let pageData = [];

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBtn').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userPhoto').src = user.photoURL;
                loadHistory(user.uid);
            }
        });

        document.getElementById('loginBtn').onclick = () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => location.reload());

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.id;
            };
        });

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = () => fInput.click();
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name.toUpperCase();
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('analyzeBtn').onclick = () => {
            renderContent(pageData);
            saveToCloud();
        };

        function renderContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            const analyzedPages = data.slice(1);
            const globalText = data.flatMap(p => p.text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 50));

            analyzedPages.forEach((page) => {
                const sentences = page.text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 35);
                
                const extractTopic = (list) => {
                    if (!list.length) return "contextual section";
                    const base = list.slice(0, 3).reduce((a, b) => a.length > b.length ? a : b);
                    const stopWords = ['this', 'page', 'section', 'talks', 'about', 'discusses'];
                    return base.split(' ').filter(w => !stopWords.includes(w.toLowerCase())).slice(0, 8).join(' ').replace(/[,.;:]$/, "");
                };

                const primaryThesis = extractTopic(sentences);
                const logicPoint = sentences.find(s => s.match(/because|since|therefore|resulted|witnessed/i)) || sentences[0];

                const card = document.createElement('div');
                card.className = "study-card p-10 mb-8 shadow-sm";
                
                let bodyHTML = "";
                if (currentLevel === "l1") {
                    bodyHTML = `
                        <h4 class="text-[9px] font-black text-blue-600 uppercase tracking-widest mb-4">Summary</h4>
                        <p class="text-slate-800 text-md font-bold leading-relaxed border-l-4 border-blue-600 pl-6 mb-6">
                            Analyzing: **${primaryThesis}...**
                        </p>
                        <p class="text-slate-500 text-xs leading-relaxed italic">This section builds the evidentiary framework for the chapter's core claims.</p>`;
                } else if (currentLevel === "l2") {
                    bodyHTML = `
                        <div class="bg-slate-900 p-8 rounded-[30px] text-white">
                            <h4 class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-4">Logic</h4>
                            <p class="text-sm font-bold leading-relaxed">${logicPoint}.</p>
                        </div>`;
                } else {
                    const correct = sentences[0] || "Textual evidence.";
                    const wrong = globalText.filter(s => !s.includes(primaryThesis.split(' ')[0]))[Math.floor(Math.random() * 8)] || "Metadata.";
                    const choices = [{ t: correct, c: true }, { t: wrong, c: false }].sort(() => Math.random() - 0.5);

                    bodyHTML = `
                        <h4 class="text-[9px] font-black text-slate-400 uppercase mb-6 italic">Mastery: ${primaryThesis}</h4>
                        <div class="space-y-3">
                            ${choices.map(o => `
                                <div class="quiz-opt" onclick="this.style.borderColor='${o.c ? '#10b981' : '#ef4444'}';">
                                    <p class="text-slate-600 font-bold text-xs">${o.t}</p>
                                </div>`).join('')}
                        </div>`;
                }

                card.innerHTML = `<span class="bg-blue-600 text-white px-4 py-1.5 rounded-full text-[9px] font-black uppercase mb-8 inline-block">PAGE ${page.num}</span>${bodyHTML}`;
                out.appendChild(card);
            });
        }

        async function saveToCloud() {
            const user = auth.currentUser;
            if (user) {
                await db.collection('users').doc(user.uid).collection('history').add({
                    fileName: document.getElementById('fileNameDisplay').innerText,
                    data: pageData,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                loadHistory(user.uid);
            }
        }

        async function loadHistory(uid) {
            const snap = await db.collection('users').doc(uid).collection('history').orderBy('timestamp', 'desc').limit(10).get();
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const item = document.createElement('div');
                item.className = "history-item truncate";
                item.innerText = doc.data().fileName;
                item.onclick = () => { pageData = doc.data().data; renderContent(pageData); };
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>
