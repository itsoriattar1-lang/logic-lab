<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision | Student AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; color: #1e293b; }
        .study-card { border-radius: 32px; background: white; border: 1px solid #f1f5f9; transition: 0.3s ease; }
        .level-btn { transition: 0.3s; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 11px; padding: 1rem 1.5rem; border-radius: 14px; background: #f8fafc; border: 1px solid #e2e8f0; }
        .level-btn.active { background: #2563eb; color: white; border-color: #2563eb; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-6 md:p-12">

    <nav class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 mb-16">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg">D</div>
            <h1 class="text-lg font-black tracking-tight">DocuVision <span class="text-blue-600 italic">Lite</span></h1>
        </div>
        <div class="flex bg-slate-100 p-1.5 rounded-2xl gap-2">
            <button class="level-btn active" id="l1">Quick Summary</button>
            <button class="level-btn" id="l2">Logic & Why</button>
            <button class="level-btn" id="l3">Mastery</button>
        </div>
    </nav>

    <div class="max-w-xl mx-auto mb-16">
        <div id="dropZone" class="p-8 border-2 border-dashed border-slate-200 rounded-[30px] bg-white flex items-center justify-between cursor-pointer hover:border-blue-400 transition-all group">
            <div class="flex items-center gap-4">
                <span id="fileNameDisplay" class="text-xs font-black text-slate-400 uppercase tracking-widest">Select PDF</span>
            </div>
            <button id="analyzeBtn" disabled class="bg-slate-900 text-white px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest disabled:opacity-20 transition-all">Start AI</button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf">
        </div>
    </div>

    <div id="output" class="max-w-3xl mx-auto space-y-8"></div>

    <script>
        let pageData = [];
        let currentLevel = "l1";

        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.id;
                if(pageData.length) renderContent(pageData);
            };
        });

        const fInput = document.getElementById('fileInput');
        document.getElementById('dropZone').onclick = (e) => { if(e.target !== document.getElementById('analyzeBtn')) fInput.click(); };
        
        fInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = file.name;
            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                pageData = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    pageData.push({ num: i, text: textContent.items.map(item => item.str).join(" ") });
                }
                document.getElementById('analyzeBtn').disabled = false;
            };
            reader.readAsArrayBuffer(file);
        };

        // --- IMPROVED AI LOGIC ---
        async function fetchAIResponse(text) {
            const cleanText = text.replace(/\s+/g, ' ').substring(0, 1000);
            const token = "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";
            
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/facebook/bart-large-cnn", {
                    headers: { Authorization: "Bearer " + token },
                    method: "POST",
                    body: JSON.stringify({ inputs: cleanText })
                });
                const result = await response.json();
                
                // Final check to make sure result isn't empty
                if (result[0]?.summary_text) {
                    return result[0].summary_text;
                }
                throw new Error("No data");
            } catch {
                // Fallback: If AI fails, grab the first 2 important sentences
                const sentences = text.match(/[^.!?]+[.!?:]+/g) || [text];
                return sentences[0] + " " + (sentences[1] || "");
            }
        }

        document.getElementById('analyzeBtn').onclick = () => renderContent(pageData);

        async function renderContent(data) {
            const out = document.getElementById('output');
            out.innerHTML = "";
            
            // Skip page 1 (Titles/Table of Contents)
            for(const page of data.slice(1)) {
                const card = document.createElement('div');
                card.className = "study-card p-10";
                // Initial loading state
                card.innerHTML = `<div class="h-4 w-full skeleton mb-2"></div><div class="h-4 w-2/3 skeleton"></div>`;
                out.appendChild(card);

                const finalResult = await fetchAIResponse(page.text);
                
                let innerHTML = "";
                if (currentLevel === "l1") {
                    innerHTML = `
                        <h3 class="text-blue-600 font-black text-[10px] uppercase tracking-widest mb-4">THE BIG PICTURE</h3>
                        <p class="text-lg font-bold leading-tight text-slate-800">${finalResult}</p>`;
                } else if (currentLevel === "l2") {
                    innerHTML = `
                        <h3 class="text-emerald-600 font-black text-[10px] uppercase tracking-widest mb-4">CAUSAL REASONING</h3>
                        <p class="text-lg font-bold text-slate-800">The primary logic here is: <span class="text-emerald-600 italic">"${finalResult}"</span></p>`;
                } else {
                    innerHTML = `
                        <h3 class="text-slate-400 font-black text-[10px] uppercase tracking-widest mb-4 text-center">MASTERY CHALLENGE</h3>
                        <p class="text-lg font-bold italic text-center text-slate-700">"Explain how the details on Page ${page.num} support the main summary provided."</p>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
                        <span class="text-[10px] font-black text-slate-300 tracking-tighter">SECTION ${page.num}</span>
                        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                    </div>
                    ${innerHTML}`;
            }
        }
    </script>
</body>
</html>
