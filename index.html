<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuVision AI | PDF Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .drop-zone { border: 2px dashed #3b82f6; transition: all 0.3s ease; }
        .drop-zone.active { border-color: #10b981; background: #ecfdf5; }
        .slide-card { border-left: 4px solid #3b82f6; transition: transform 0.2s; }
        .slide-card:hover { transform: translateX(5px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    <div class="max-w-5xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10 border-b pb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">DocuVision <span class="text-blue-600">AI</span></h1>
                <p class="text-sm text-slate-500 font-medium">Advanced Document Intelligence Analysis</p>
            </div>
            <div class="flex gap-4">
                <span id="systemStatus" class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold uppercase tracking-wider">System: Ready</span>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div id="dropZone" class="drop-zone rounded-xl p-8 text-center bg-white shadow-sm cursor-pointer">
                    <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p id="fileNameDisplay" class="font-semibold text-slate-700 uppercase text-xs tracking-widest">Upload PDF</p>
                    <input type="file" id="fileInput" class="hidden" accept=".pdf">
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <h3 class="text-sm font-bold uppercase text-slate-400 mb-4 tracking-widest">Controls</h3>
                    <button id="analyzeBtn" disabled class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-all disabled:opacity-30 disabled:cursor-not-allowed shadow-lg shadow-blue-200">
                        Generate Slide Analysis
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 min-h-[500px]">
                    <div class="flex items-center justify-between mb-8 border-b pb-4">
                        <h2 class="text-lg font-black uppercase tracking-tight">Intelligence Report</h2>
                        <div id="statusLabel" class="text-xs font-bold text-blue-500 uppercase">Standby</div>
                    </div>
                    <div id="output" class="space-y-6">
                        <p class="text-slate-400 italic">Waiting for document input...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const output = document.getElementById('output');
        const statusLabel = document.getElementById('statusLabel');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let slideData = [];

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            fileNameDisplay.innerText = file.name;
            statusLabel.innerText = "DIGESTING PDF...";
            analyzeBtn.disabled = true;
            slideData = [];

            const reader = new FileReader();
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        
                        // Try to guess a title from the first few words
                        const words = pageText.trim().split(/\s+/);
                        const titleGuess = words.slice(0, 4).join(" ");

                        slideData.push({
                            number: i,
                            title: titleGuess || "Untitled Section",
                            content: pageText
                        });
                    }

                    statusLabel.innerText = "READY";
                    output.innerHTML = `<div class="p-4 bg-slate-50 border border-slate-200 rounded text-slate-600">Document loaded. Found <strong>${slideData.length} sections</strong> ready for analysis.</div>`;
                    analyzeBtn.disabled = false;
                } catch (err) {
                    output.innerText = "Error: " + err.message;
                }
            };
            reader.readAsArrayBuffer(file);
        };

        analyzeBtn.onclick = () => {
            statusLabel.innerText = "GENERATING ANALYSIS...";
            output.innerHTML = `<div class="animate-pulse space-y-4 text-center py-10"><div class="h-2 bg-slate-200 rounded"></div><p class="text-xs text-slate-400">Processing Slide Data Structure...</p></div>`;
            
            setTimeout(() => {
                output.innerHTML = ""; // Clear loader
                
                slideData.forEach(slide => {
                    const card = document.createElement('div');
                    card.className = "slide-card bg-white p-5 rounded shadow-sm border border-slate-100 mb-4";
                    card.innerHTML = `
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded">SLIDE ${slide.number}</span>
                            <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wide">${slide.title}...</h3>
                        </div>
                        <div class="text-slate-600 text-sm leading-relaxed mb-3">
                            ${slide.content.substring(0, 300)}...
                        </div>
                        <div class="flex gap-2">
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-1 rounded">Length: ${slide.content.length} chars</span>
                            <span class="text-[10px] bg-green-50 text-green-600 px-2 py-1 rounded">Confidence: High</span>
                        </div>
                    `;
                    output.appendChild(card);
                });
                statusLabel.innerText = "ANALYSIS COMPLETE";
            }, 1500);
        };
    </script>
</body>
</html>
